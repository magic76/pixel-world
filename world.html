<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Virtual Office</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; overflow: hidden; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  #top-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; background: #16213e;
    border-bottom: 2px solid #0f3460; z-index: 10; flex-shrink: 0;
  }
  @media (max-width: 768px) {
    #top-bar {
      padding: 4px 8px; gap: 6px;
      flex-wrap: wrap;
    }
    #top-bar input { font-size: 12px; padding: 3px 6px; }
    .bar-label { font-size: 11px; }
    .separator { height: 14px; }
  }
  .bar-label { font-size: 13px; color: #8899aa; }
  .separator { width: 1px; height: 20px; background: #0f3460; }
  #top-bar input {
    font-size: 13px; border: 1px solid #0f3460; border-radius: 6px;
    padding: 5px 10px; background: #1a1a2e; color: #e0e0e0; outline: none;
  }
  #top-bar input:focus { border-color: #e94560; }
  #status { font-size: 12px; color: #53d769; margin-left: auto; }
  #online-count { font-size: 12px; color: #8899aa; }

  #lobby-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,10,20,0.85);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  #lobby-overlay.hidden { display: none; }
  #lobby {
    background: #16213e; border: 2px solid #0f3460; border-radius: 16px;
    padding: 36px 40px; width: 400px; max-width: 92vw; text-align: center;
    max-height: 90vh; max-height: 90dvh; overflow-y: auto;
  }
  #lobby h1 { font-size: 28px; margin-bottom: 6px; color: #fff; }
  #lobby p { font-size: 13px; color: #8899aa; margin-bottom: 24px; }
  #lobby input {
    width: 100%; padding: 10px 14px; font-size: 15px;
    border: 2px solid #0f3460; border-radius: 10px;
    background: #1a1a2e; color: #e0e0e0; outline: none;
    margin-bottom: 12px; text-align: center;
  }
  #lobby input:focus { border-color: #e94560; }
  #lobby input::placeholder { color: #445; }
  .lobby-btn {
    display: block; width: 100%; padding: 12px; font-size: 15px;
    font-weight: 700; border: none; border-radius: 10px;
    cursor: pointer; margin-bottom: 10px; transition: background .2s, transform .1s;
  }
  .lobby-btn:active { transform: scale(0.97); }
  .btn-create { background: #e94560; color: #fff; }
  .btn-create:hover { background: #d63b54; }
  .btn-join { background: #0f3460; color: #e0e0e0; }
  .btn-join:hover { background: #1a4a80; }
  .btn-join:disabled { opacity: 0.4; cursor: not-allowed; }
  #lobby-status { font-size: 13px; color: #e94560; margin-top: 8px; min-height: 20px; }

  .avatar-upload {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 14px;
  }
  .avatar-upload label {
    font-size: 13px; color: #8899aa; cursor: pointer;
  }
  .avatar-preview {
    width: 48px; height: 48px; border-radius: 50%;
    border: 2px solid #0f3460; background: #1a1a2e;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative;
  }
  .avatar-preview img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .avatar-preview .placeholder {
    font-size: 22px; color: #445;
  }
  .avatar-upload-btn {
    padding: 6px 14px; font-size: 13px; font-weight: 600;
    border: 1px solid #0f3460; border-radius: 8px;
    background: #1a1a2e; color: #8899aa; cursor: pointer;
    transition: all .2s;
  }
  .avatar-upload-btn:hover { border-color: #e94560; color: #e94560; }

  .room-code {
    font-size: 18px; color: #f0ad4e; font-weight: 900;
    letter-spacing: 2px; cursor: pointer;
  }
  .room-code:hover { color: #ffc107; }
  .copy-hint {
    font-size: 11px; color: #53d769; opacity: 0;
    transition: opacity .3s; margin-left: 4px;
  }
  .copy-hint.show { opacity: 1; }

  #mic-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid #0f3460; background: #1a1a2e;
    color: #8899aa; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  #mic-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
  #mic-btn:hover { border-color: #e94560; }

  #game-container { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; touch-action: none; }

  #chat-bar {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); z-index: 10;
    display: flex; align-items: center; gap: 8px;
  }
  #chat-input {
    width: 340px; padding: 10px 16px; border-radius: 20px;
    border: 2px solid #0f3460; background: rgba(22,33,62,0.92);
    color: #e0e0e0; font-size: 14px; outline: none; backdrop-filter: blur(6px);
    display: none;
  }
  #chat-input.visible { display: block; }
  #chat-input:focus { border-color: #e94560; }
  #chat-input::placeholder { color: #556; }

  .emote-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid #0f3460; background: rgba(22,33,62,0.92);
    font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px); transition: all .15s;
    user-select: none;
  }
  .emote-btn:hover { border-color: #e94560; transform: scale(1.15); }
  .emote-btn:active { transform: scale(0.95); }

  #help-hint {
    position: absolute; bottom: 72px; left: 50%;
    transform: translateX(-50%); font-size: 12px;
    color: #556; pointer-events: none; text-align: center;
  }

  #notifications {
    position: absolute; top: 10px; left: 50%;
    transform: translateX(-50%); z-index: 20;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    pointer-events: none;
  }
  .notif {
    padding: 6px 16px; background: rgba(22,33,62,0.9);
    border: 1px solid #0f3460; border-radius: 20px;
    font-size: 13px; color: #e0e0e0; backdrop-filter: blur(4px);
    animation: notifIn .3s ease-out, notifOut .5s 2.5s ease-in forwards;
  }
  @keyframes notifIn { from { opacity:0; transform:translateY(-10px); } }
  @keyframes notifOut { to { opacity:0; transform:translateY(-10px); } }

  #player-list {
    position: absolute; top: 10px; left: 10px; z-index: 15;
    background: rgba(22,33,62,0.85); border: 1px solid #0f3460;
    border-radius: 10px; padding: 10px 14px; min-width: 140px;
    backdrop-filter: blur(4px);
  }
  #player-list h3 {
    font-size: 11px; color: #8899aa; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px;
  }
  .pl-entry { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 2px 0; }
  .pl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pl-hp { color: #e94560; font-size: 11px; margin-left: auto; }

  /* ─── Mobile Controls ─── */
  #mobile-controls {
    display: none;
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 30; pointer-events: none;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    justify-content: space-between; align-items: flex-end;
  }
  @media (pointer: coarse), (max-width: 768px) {
    #mobile-controls { display: flex; }
    #help-hint { display: none; }
    #chat-bar { bottom: 180px; }
    #chat-input { width: 260px; font-size: 13px; padding: 8px 12px; }
    #player-list { top: 4px; left: 4px; padding: 6px 8px; min-width: 100px; }
    #player-list h3 { font-size: 10px; margin-bottom: 3px; }
    .pl-entry { font-size: 11px; gap: 4px; }
    .pl-dot { width: 6px; height: 6px; }
  }
  .dpad {
    pointer-events: auto;
    --btn-size: min(13vw, 52px);
    display: grid;
    grid-template-columns: var(--btn-size) var(--btn-size) var(--btn-size);
    grid-template-rows: var(--btn-size) var(--btn-size) var(--btn-size);
    gap: 3px;
  }
  .dpad-btn {
    width: var(--btn-size); height: var(--btn-size); border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.18);
    background: rgba(22,33,62,0.8);
    backdrop-filter: blur(6px);
    color: #ccc; font-size: min(5.5vw, 22px);
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    cursor: pointer;
    transition: background .1s, transform .1s;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: rgba(233,69,96,0.5);
    border-color: #e94560;
    transform: scale(0.93);
  }
  .dpad-center {
    width: var(--btn-size); height: var(--btn-size);
    border-radius: 12px; background: transparent; border: none;
  }
  .action-btns {
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .action-btn {
    --act-size: min(16vw, 62px);
    width: var(--act-size); height: var(--act-size); border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.18);
    background: rgba(22,33,62,0.8);
    backdrop-filter: blur(6px);
    color: #fff; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    cursor: pointer;
    transition: background .1s, transform .1s;
    flex-direction: column; gap: 1px;
  }
  .action-btn .act-icon { font-size: min(5.5vw, 22px); line-height: 1; }
  .action-btn .act-label { font-size: min(2.5vw, 10px); opacity: 0.7; line-height: 1; }
  .action-btn:active, .action-btn.pressed {
    background: rgba(233,69,96,0.5);
    border-color: #e94560;
    transform: scale(0.93);
  }
  .action-btn.btn-atk { border-color: rgba(233,69,96,0.4); }
  .action-btn.btn-chat { border-color: rgba(83,215,105,0.4); }
  .action-row { display: flex; gap: min(3vw, 12px); }
</style>
</head>
<body>

<div id="lobby-overlay">
  <div id="lobby">
    <h1>Virtual Office</h1>
    <p>Create a room or join a friend's office</p>
    <div class="avatar-upload">
      <div class="avatar-preview" onclick="document.getElementById('avatar-file').click()" title="Upload avatar">
        <span class="placeholder" id="avatar-placeholder">👤</span>
        <img id="avatar-img-preview" style="display:none">
      </div>
      <div>
        <button class="avatar-upload-btn" onclick="document.getElementById('avatar-file').click()">Upload Avatar</button>
        <div style="font-size:11px;color:#556;margin-top:4px">Optional, replaces head</div>
      </div>
      <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="handleAvatarUpload(this)">
    </div>
    <input id="lobby-name" type="text" placeholder="Your name" maxlength="12">
    <button class="lobby-btn btn-create" onclick="createRoom()">Create Room</button>
    <div style="display:flex;gap:8px">
      <input id="lobby-room" type="text" placeholder="Room code" maxlength="6"
             style="text-transform:uppercase; letter-spacing:2px; font-weight:700">
      <button class="lobby-btn btn-join" id="join-btn" onclick="joinRoom()" style="width:120px;flex-shrink:0" disabled>Join</button>
    </div>
    <div id="lobby-status"></div>
  </div>
</div>

<div id="top-bar">
  <span class="bar-label">Room:</span>
  <span class="room-code" id="room-code" onclick="copyRoomCode()" title="Click to copy">---</span>
  <span class="copy-hint" id="copy-hint">Copied!</span>
  <div class="separator"></div>
  <span class="bar-label">Name:</span>
  <input id="name-input" type="text" placeholder="Name" maxlength="12" style="width:100px">
  <div class="separator"></div>
  <button id="mic-btn" onclick="toggleMic()" title="Toggle voice chat">🎤</button>
  <span id="online-count"></span>
  <span id="status">● Offline</span>
</div>

<div id="game-container">
  <canvas id="canvas"></canvas>
  <div id="notifications"></div>
  <div id="player-list">
    <h3>Players</h3>
    <div id="pl-entries"></div>
  </div>
  <div id="help-hint">Arrows / WASD to move · Space to interact · Enter to chat · 🎤 proximity voice (10 tiles) · 🎁 find chests!</div>

  <div id="mobile-controls">
    <div class="dpad">
      <div class="dpad-center"></div>
      <button class="dpad-btn" data-dir="up">▲</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" data-dir="left">◄</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" data-dir="right">►</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" data-dir="down">▼</button>
      <div class="dpad-center"></div>
    </div>
    <div class="action-btns">
      <div class="action-row">
        <button class="action-btn btn-atk" id="mobile-atk">
          <span class="act-icon">👊</span>
          <span class="act-label">ATK</span>
        </button>
        <button class="action-btn btn-chat" id="mobile-chat">
          <span class="act-icon">💬</span>
          <span class="act-label">CHAT</span>
        </button>
      </div>
    </div>
  </div>
  <div id="chat-bar">
    <button class="emote-btn" onclick="sendEmote('⭕')" title="O">⭕</button>
    <button class="emote-btn" onclick="sendEmote('❌')" title="X">❌</button>
    <input id="chat-input" type="text" placeholder="Type message, Enter to send..." maxlength="100">
  </div>
</div>

<div id="audio-container" style="display:none"></div>

<script>
const TILE = 32;
const MAP_COLS = 100;
const MAP_ROWS = 76;
const MAP_W = MAP_COLS * TILE;
const MAP_H = MAP_ROWS * TILE;
const SPEED = 3;
const CHAT_DURATION = 6000;
const EMOTE_DURATION = 3000;
const PEER_PREFIX = 'pxworld-';
const MAX_HP = 4;
const ATTACK_RANGE = 42;
const ATTACK_WIDTH = 34;
const ATTACK_COOLDOWN = 500;
const GHOST_DURATION = 3000;
const COLORS = [
  '#e94560','#53d769','#5bc0de','#f0ad4e','#d9534f',
  '#9b59b6','#1abc9c','#e67e22','#2ecc71','#3498db',
];

// tile types for office map
const T = {
  FLOOR: 0, WALL: 1, DESK: 2, MONITOR: 3, CARPET: 4,
  CORRIDOR: 5, DOOR: 6, WINDOW: 7, PLANT: 8,
  PANTRY_FLOOR: 9, COUNTER: 10, FRIDGE: 11, COFFEE: 12,
  CHAIR: 13, WHITEBOARD: 14, SOFA: 15, TABLE: 16,
};
const WALKABLE = new Set([T.FLOOR, T.CORRIDOR, T.DOOR, T.CARPET, T.PANTRY_FLOOR, T.CHAIR]);

const roomLabels = []; // { x, y, label } for room number rendering

// ─── Seeded Map ───
function seededRandom(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

function generateMap(seed) {
  const rng = seededRandom(seed);
  const map = [];
  roomLabels.length = 0;
  for (let r = 0; r < MAP_ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < MAP_COLS; c++) map[r][c] = T.CORRIDOR;
  }

  // outer walls
  for (let r = 0; r < MAP_ROWS; r++)
    for (let c = 0; c < MAP_COLS; c++)
      if (r === 0 || r === MAP_ROWS-1 || c === 0 || c === MAP_COLS-1) map[r][c] = T.WALL;

  // windows on outer walls
  for (let c = 3; c < MAP_COLS-3; c += 4) { map[0][c] = T.WINDOW; map[MAP_ROWS-1][c] = T.WINDOW; }
  for (let r = 3; r < MAP_ROWS-3; r += 4) { map[r][0] = T.WINDOW; map[r][MAP_COLS-1] = T.WINDOW; }

  function fillRect(r1,c1,r2,c2,t) {
    for (let r=r1;r<=r2;r++) for (let c=c1;c<=c2;c++)
      if (r>0&&r<MAP_ROWS-1&&c>0&&c<MAP_COLS-1) map[r][c]=t;
  }
  function drawWallRect(r1,c1,r2,c2) {
    for (let c=c1;c<=c2;c++) { map[r1][c]=T.WALL; map[r2][c]=T.WALL; }
    for (let r=r1;r<=r2;r++) { map[r][c1]=T.WALL; map[r][c2]=T.WALL; }
  }
  function addDoor(r,c) { if (r>0&&r<MAP_ROWS-1&&c>0&&c<MAP_COLS-1) map[r][c]=T.DOOR; }

  // ── Main corridors (horizontal + vertical cross) ──
  const midR = MAP_ROWS/2|0, midC = MAP_COLS/2|0;
  // horizontal main corridor
  for (let c = 1; c < MAP_COLS-1; c++) { map[midR-1][c]=T.CORRIDOR; map[midR][c]=T.CORRIDOR; map[midR+1][c]=T.CORRIDOR; }
  // vertical main corridor
  for (let r = 1; r < MAP_ROWS-1; r++) { map[r][midC-1]=T.CORRIDOR; map[r][midC]=T.CORRIDOR; map[r][midC+1]=T.CORRIDOR; }

  // secondary horizontal corridors
  const hCorr1 = 12, hCorr2 = MAP_ROWS - 13;
  for (let c = 1; c < MAP_COLS-1; c++) { map[hCorr1][c]=T.CORRIDOR; map[hCorr1+1][c]=T.CORRIDOR; map[hCorr2][c]=T.CORRIDOR; map[hCorr2+1][c]=T.CORRIDOR; }
  // secondary vertical corridors
  const vCorr1 = 20, vCorr2 = MAP_COLS - 21;
  for (let r = 1; r < MAP_ROWS-1; r++) { map[r][vCorr1]=T.CORRIDOR; map[r][vCorr1+1]=T.CORRIDOR; map[r][vCorr2]=T.CORRIDOR; map[r][vCorr2+1]=T.CORRIDOR; }

  // ── Helper: create a room with walls, floor, door, and label ──
  let roomNum = 1;
  function makeRoom(r1, c1, rh, cw, type) {
    const r2 = r1+rh-1, c2 = c1+cw-1;
    if (r2 >= MAP_ROWS-1 || c2 >= MAP_COLS-1 || r1 <= 0 || c1 <= 0) return;
    const floorType = type === 'meeting' ? T.CARPET : type === 'pantry' ? T.PANTRY_FLOOR : T.FLOOR;
    fillRect(r1, c1, r2, c2, floorType);
    drawWallRect(r1, c1, r2, c2);
    fillRect(r1+1, c1+1, r2-1, c2-1, floorType);

    // door on a reachable side
    const sides = [];
    // check which sides are adjacent to corridors
    for (let c = c1+1; c < c2; c++) { if (map[r1-1]?.[c]===T.CORRIDOR) sides.push({r:r1,c}); if (map[r2+1]?.[c]===T.CORRIDOR) sides.push({r:r2,c}); }
    for (let r = r1+1; r < r2; r++) { if (map[r]?.[c1-1]===T.CORRIDOR) sides.push({r,c:c1}); if (map[r]?.[c2+1]===T.CORRIDOR) sides.push({r,c:c2}); }
    if (sides.length > 0) {
      const d = sides[Math.floor(rng() * sides.length)];
      addDoor(d.r, d.c);
    } else {
      addDoor(r2, c1 + Math.floor(cw/2));
    }

    const label = type === 'meeting' ? 'MTG' : type === 'pantry' ? 'Pantry' : String(roomNum++);
    roomLabels.push({ x: (c1 + c2) / 2 * TILE + TILE/2, y: r1 * TILE + TILE/2, label, type });

    // furnish based on type
    if (type === 'office') {
      for (let r = r1+2; r < r2-1; r += 3) {
        for (let c = c1+2; c < c2-2; c += 4) {
          if (map[r][c] === floorType) { map[r][c] = T.DESK; if (c+1<c2) map[r][c+1] = T.MONITOR; }
          if (r+1 < r2 && map[r+1][c] === floorType) map[r+1][c] = T.CHAIR;
        }
      }
    } else if (type === 'meeting') {
      const tr1 = r1 + Math.floor(rh/2) - 1, tc1 = c1 + 2, tc2 = c2 - 2;
      for (let c = tc1; c <= tc2; c++) if (map[tr1][c]===floorType) map[tr1][c] = T.TABLE;
      if (map[tr1+1]) for (let c = tc1; c <= tc2; c++) if (map[tr1+1][c]===floorType) map[tr1+1][c] = T.TABLE;
      // chairs around table
      for (let c = tc1; c <= tc2; c += 2) {
        if (tr1-1>r1 && map[tr1-1][c]===floorType) map[tr1-1][c] = T.CHAIR;
        if (tr1+2<r2 && map[tr1+2][c]===floorType) map[tr1+2][c] = T.CHAIR;
      }
      // whiteboard
      if (map[r1+1][c2-1]===floorType) map[r1+1][c2-1] = T.WHITEBOARD;
    } else if (type === 'pantry') {
      // counters along one wall
      for (let c = c1+1; c < c2; c++) if (map[r1+1][c]===floorType) map[r1+1][c] = T.COUNTER;
      if (map[r1+1][c1+1]===T.COUNTER) map[r1+1][c1+1] = T.FRIDGE;
      if (map[r1+1][c2-1]===T.COUNTER) map[r1+1][c2-1] = T.COFFEE;
      // tables & chairs
      const tr = r1 + Math.floor(rh/2)+1;
      for (let c = c1+2; c < c2-1; c += 3) {
        if (tr < r2 && map[tr][c]===floorType) map[tr][c] = T.TABLE;
        if (tr-1>r1+1 && map[tr-1][c]===floorType) map[tr-1][c] = T.CHAIR;
        if (tr+1<r2 && map[tr+1][c]===floorType) map[tr+1][c] = T.CHAIR;
      }
      // sofa
      if (r2-2>r1+1 && map[r2-2][c1+1]===floorType) map[r2-2][c1+1] = T.SOFA;
    } else {
      // small numbered room: desk + chair
      if (r1+2<r2 && c1+2<c2) {
        map[r1+1][c2-1] = T.DESK;
        if (c2-2>c1) map[r1+1][c2-2] = T.MONITOR;
        map[r1+2][c2-1] = T.CHAIR;
      }
    }
  }

  // ── Top-left quadrant: numbered small rooms ──
  for (let i = 0; i < 4; i++) {
    const rr = 2 + i * Math.floor((hCorr1 - 3) / 4);
    makeRoom(rr, 2, Math.floor((hCorr1 - 3) / 4), 8, 'small');
    makeRoom(rr, 11, Math.floor((hCorr1 - 3) / 4), 8, 'small');
  }

  // ── Top-right quadrant: more numbered rooms ──
  for (let i = 0; i < 4; i++) {
    const rr = 2 + i * Math.floor((hCorr1 - 3) / 4);
    makeRoom(rr, vCorr2 + 2, Math.floor((hCorr1 - 3) / 4), 8, 'small');
    makeRoom(rr, MAP_COLS - 10, Math.floor((hCorr1 - 3) / 4), 8, 'small');
  }

  // ── Open office areas (top middle) ──
  makeRoom(2, vCorr1 + 2, hCorr1 - 3, vCorr2 - vCorr1 - 2, 'office');

  // ── Meeting rooms (bottom-left) ──
  makeRoom(hCorr2 + 2, 2, MAP_ROWS - hCorr2 - 4, 14, 'meeting');
  makeRoom(hCorr2 + 2, 17, MAP_ROWS - hCorr2 - 4, 14, 'meeting');

  // ── Pantry (bottom-right) ──
  makeRoom(hCorr2 + 2, vCorr2 + 2, MAP_ROWS - hCorr2 - 4, MAP_COLS - vCorr2 - 4, 'pantry');

  // ── Middle-left: office area ──
  makeRoom(hCorr1 + 2, 2, midR - hCorr1 - 4, vCorr1 - 3, 'office');

  // ── Middle-right: office area ──
  makeRoom(hCorr1 + 2, vCorr2 + 2, midR - hCorr1 - 4, MAP_COLS - vCorr2 - 4, 'office');

  // ── Bottom-middle area: more numbered rooms ──
  for (let i = 0; i < 3; i++) {
    const roomW = Math.floor((vCorr2 - vCorr1 - 2) / 3);
    makeRoom(hCorr2 + 2, vCorr1 + 2 + i * roomW, MAP_ROWS - hCorr2 - 4, roomW, 'small');
  }

  // ── Left side: lower rooms ──
  makeRoom(midR + 2, 2, hCorr2 - midR - 3, 9, 'small');
  makeRoom(midR + 2, 12, hCorr2 - midR - 3, 9, 'small');

  // ── Right side: lower rooms ──
  makeRoom(midR + 2, vCorr2 + 2, hCorr2 - midR - 3, 9, 'small');
  makeRoom(midR + 2, MAP_COLS - 11, hCorr2 - midR - 3, 9, 'small');

  // ── Center area: large meeting room ──
  makeRoom(hCorr1 + 2, vCorr1 + 2, midR - hCorr1 - 4, vCorr2 - vCorr1 - 2, 'meeting');

  // ── Lower-center office ──
  makeRoom(midR + 2, vCorr1 + 2, hCorr2 - midR - 3, vCorr2 - vCorr1 - 2, 'office');

  // ── Scatter plants in corridors ──
  for (let r = 2; r < MAP_ROWS-2; r++)
    for (let c = 2; c < MAP_COLS-2; c++)
      if (map[r][c] === T.CORRIDOR && rng() < 0.008) map[r][c] = T.PLANT;

  // clear spawn (lobby area near center)
  const spawnR = midR, spawnC = midC;
  for (let r = spawnR-2; r <= spawnR+2; r++)
    for (let c = spawnC-2; c <= spawnC+2; c++)
      if (r>0 && r<MAP_ROWS-1 && c>0 && c<MAP_COLS-1) map[r][c] = T.CORRIDOR;

  return map;
}

const NUM_CHESTS = 20;
const CHEST_RANGE = 45;
let chests = []; // { id, x, y, opened, equipId }

function generateChests(seed) {
  const rng = seededRandom(seed + 999);
  const result = [];
  for (let i = 0; i < NUM_CHESTS; i++) {
    let cx, cy, attempts = 0;
    do {
      cx = 6 + Math.floor(rng() * (MAP_COLS - 12));
      cy = 6 + Math.floor(rng() * (MAP_ROWS - 12));
      attempts++;
    } while (!WALKABLE.has(MAP[cy]?.[cx]) && attempts < 300);
    const equipIdx = Math.floor(rng() * EQUIP_LIST.length);
    result.push({
      id: i,
      x: cx * TILE + TILE / 2,
      y: cy * TILE + TILE / 2,
      opened: false,
      equipId: EQUIP_LIST[equipIdx].id,
    });
  }
  return result;
}

const NUM_CARS = 4;
let cars = []; // { id, x, y, dir, driverPid: null }

function generateCars(seed) {
  const rng = seededRandom(seed + 777);
  const result = [];
  for (let i = 0; i < NUM_CARS; i++) {
    let cx, cy, attempts = 0;
    do {
      cx = 4 + Math.floor(rng() * (MAP_COLS - 8));
      cy = 4 + Math.floor(rng() * (MAP_ROWS - 8));
      attempts++;
    } while (!WALKABLE.has(MAP[cy]?.[cx]) && attempts < 200);
    result.push({
      id: i,
      x: cx * TILE + TILE / 2,
      y: cy * TILE + TILE / 2,
      dir: Math.floor(rng() * 4),
      driverPid: null,
      color: ['#e74c3c','#3498db','#f1c40f','#2ecc71'][i],
    });
  }
  return result;
}

// ─── Voice Chat ───
let silentStream = null;

function ensureSilentStream() {
  if (silentStream) return silentStream;
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    ac.resume();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    gain.gain.value = 0;
    osc.connect(gain);
    const dest = ac.createMediaStreamDestination();
    gain.connect(dest);
    osc.start();
    silentStream = dest.stream;
  } catch (e) {
    console.warn('Could not create silent stream:', e);
  }
  return silentStream;
}

async function toggleMic() {
  if (micEnabled) {
    micEnabled = false;
    micBtn.classList.remove('active');
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    for (const [pid, call] of Object.entries(mediaCalls)) { call.close(); delete mediaCalls[pid]; }
    broadcast({ type: 'voice_state', speaking: false });
    notify('Mic off');
  } else {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      micEnabled = true;
      micBtn.classList.add('active');
      broadcast({ type: 'voice_state', speaking: true });
      for (const pid of Object.keys(connections)) callPeer(pid);
      notify('Mic on');
    } catch (e) {
      notify('Microphone access denied');
      console.error('Mic error:', e);
    }
  }
  updatePlayerList();
}

function callPeer(pid) {
  if (!localStream || !peer) return;
  if (mediaCalls[pid]) { mediaCalls[pid].close(); delete mediaCalls[pid]; }
  try {
    const call = peer.call(pid, localStream);
    if (!call) return;
    mediaCalls[pid] = call;
    call.on('stream', stream => playRemoteAudio(pid, stream));
    call.on('close', () => { delete mediaCalls[pid]; removeRemoteAudio(pid); });
    call.on('error', err => console.error('Call error:', pid, err));
  } catch (e) { console.error('Call failed:', pid, e); }
}

function handleIncomingCall(call) {
  const pid = call.peer;
  if (mediaCalls[pid]) { mediaCalls[pid].close(); delete mediaCalls[pid]; }
  const stream = localStream || ensureSilentStream();
  if (!stream) { console.warn('No stream to answer with'); return; }
  call.answer(stream);
  mediaCalls[pid] = call;
  call.on('stream', s => playRemoteAudio(pid, s));
  call.on('close', () => { delete mediaCalls[pid]; removeRemoteAudio(pid); });
  call.on('error', err => console.error('Incoming call error:', pid, err));
}

function playRemoteAudio(pid, stream) {
  removeRemoteAudio(pid);
  const audio = document.createElement('audio');
  audio.srcObject = stream;
  audio.autoplay = true;
  audio.playsInline = true;
  audio.volume = 1.0;
  audio.id = 'audio-' + pid;
  audioContainer.appendChild(audio);
  remoteAudios[pid] = audio;
  const p = audio.play();
  if (p) p.catch(() => {
    const resume = () => { audio.play().catch(()=>{}); document.removeEventListener('click', resume); document.removeEventListener('keydown', resume); };
    document.addEventListener('click', resume);
    document.addEventListener('keydown', resume);
  });
}

function removeRemoteAudio(pid) {
  if (remoteAudios[pid]) {
    remoteAudios[pid].pause();
    remoteAudios[pid].srcObject = null;
    remoteAudios[pid].remove();
    delete remoteAudios[pid];
  }
}

// ─── PeerJS ───
function initPeer(customId, hostPeerId) {
  const iceServers = [
      { urls: 'stun:stun.l.google.com:19302' },         // 免費 STUN
      {
        urls: 'turn:preview-1r0ywrjsvu.orba.qa1fdg.net:3478',               // 你的 TURN
        username: 'myuser',
        credential: 'mypassword'
      },
      {
        urls: 'turns:preview-1r0ywrjsvu.orba.qa1fdg.net:5349',              // TLS 版本，更不容易被擋
        username: 'myuser',
        credential: 'mypassword'
      }
    ]
  peer = customId ? new Peer(customId, { debug: 0, iceServers: iceServers }) : new Peer({ debug: 0, iceServers: iceServers });

  peer.on('open', id => {
    myId = id;
    document.getElementById('status').textContent = '● Online';
    document.getElementById('status').style.color = '#53d769';
    if (hostPeerId) {
      const conn = peer.connect(hostPeerId, { reliable: true });
      conn.on('open', () => { connections[hostPeerId] = conn; conn.send({ type: 'join', player: getMyState() }); });
      conn.on('data', data => handleData(hostPeerId, data));
      conn.on('close', () => handleDisconnect(hostPeerId));
      conn.on('error', () => setLobbyStatus('Connection failed', true));
    } else { startGame(); }
  });

  peer.on('connection', conn => {
    const pid = conn.peer;
    conn.on('open', () => {
      connections[pid] = conn;
      conn.send({ type: 'welcome', mapSeed, hostPlayer: getMyState(), players: getRemotePlayerStates(), peers: Object.keys(connections).filter(i => i !== pid), cars: cars, chests: chests });
      updateOnlineCount(); updatePlayerList();
    });
    conn.on('data', data => handleData(pid, data));
    conn.on('close', () => handleDisconnect(pid));
  });

  peer.on('call', call => handleIncomingCall(call));

  peer.on('error', err => {
    console.error('Peer error:', err);
    if (!gameStarted) {
      if (err.type === 'unavailable-id') setLobbyStatus('Room code taken, try again', true);
      else if (err.type === 'peer-unavailable') setLobbyStatus('Room not found', true);
      else setLobbyStatus('Error: ' + err.type, true);
    }
    document.getElementById('status').textContent = '● Error';
    document.getElementById('status').style.color = '#e94560';
  });
}

function handleDisconnect(pid) {
  const name = remotePlayers[pid]?.name || 'Someone';
  delete connections[pid]; delete remotePlayers[pid];
  delete remoteAvatarImgs[pid];
  for (const car of cars) if (car.driverPid === pid) car.driverPid = null;
  if (mediaCalls[pid]) { mediaCalls[pid].close(); delete mediaCalls[pid]; }
  removeRemoteAudio(pid);
  updateOnlineCount(); updatePlayerList();
  if (gameStarted) notify(name + ' left');
}

function handleData(fromId, data) {
  switch (data.type) {
    case 'welcome':
      mapSeed = data.mapSeed; MAP = generateMap(mapSeed);
      cars = data.cars || generateCars(mapSeed);
      chests = data.chests || generateChests(mapSeed);
      if (data.hostPlayer) remotePlayers[fromId] = makeRemote(data.hostPlayer, fromId);
      if (data.players) for (const [pid, ps] of Object.entries(data.players)) remotePlayers[pid] = makeRemote(ps, pid);
      if (data.peers) data.peers.forEach(pid => { if (pid !== myId && !connections[pid]) connectToPeer(pid); });
      startGame();
      break;
    case 'join':
      if (data.player) {
        remotePlayers[fromId] = makeRemote(data.player, fromId);
        notify(data.player.name + ' joined!');
        updatePlayerList();
        broadcast({ type: 'player_joined', peerId: fromId, player: data.player }, fromId);
        if (micEnabled) setTimeout(() => callPeer(fromId), 500);
      }
      break;
    case 'player_joined':
      if (data.player && data.peerId !== myId) {
        remotePlayers[data.peerId] = makeRemote(data.player, data.peerId);
        if (!connections[data.peerId]) connectToPeer(data.peerId);
        updatePlayerList();
      }
      break;
    case 'hello':
      if (data.player) {
        remotePlayers[fromId] = makeRemote(data.player, fromId);
        if (connections[fromId]) connections[fromId].send({ type: 'hello_ack', player: getMyState() });
        updatePlayerList();
        if (micEnabled) setTimeout(() => callPeer(fromId), 500);
      }
      break;
    case 'hello_ack':
      if (data.player) { remotePlayers[fromId] = makeRemote(data.player, fromId); updatePlayerList(); }
      break;
    case 'move': {
      if (!remotePlayers[fromId]) remotePlayers[fromId] = makeRemote(data.player, fromId);
      const rp = remotePlayers[fromId];
      rp.targetX = data.player.x; rp.targetY = data.player.y;
      rp.dir = data.player.dir; rp.walking = data.player.walking;
      rp.color = data.player.color; rp.name = data.player.name;
      break;
    }
    case 'chat':
      if (remotePlayers[fromId]) { remotePlayers[fromId].chat = data.text; remotePlayers[fromId].chatTime = Date.now(); }
      break;
    case 'emote':
      if (remotePlayers[fromId]) { remotePlayers[fromId].emote = data.emote; remotePlayers[fromId].emoteTime = Date.now(); }
      break;
    case 'attack':
      if (remotePlayers[fromId]) {
        remotePlayers[fromId].attacking = true;
        remotePlayers[fromId].attackTime = Date.now();
        addAttackEffect(data.x, data.y, data.dir);
      }
      break;
    case 'hit':
      myPlayer.hp = Math.max(0, myPlayer.hp - 1);
      addDamageFlash();
      if (myPlayer.hp <= 0) {
        myPlayer.ghostUntil = Date.now() + GHOST_DURATION;
        myPlayer.hp = 0;
        setTimeout(() => {
          myPlayer.hp = MAX_HP;
          myPlayer.x = MAP_W/2 + (Math.random()-.5)*200;
          myPlayer.y = MAP_H/2 + (Math.random()-.5)*200;
          broadcast({ type: 'move', player: getMyState() });
          broadcast({ type: 'hp_update', hp: myPlayer.hp });
        }, GHOST_DURATION);
      }
      broadcast({ type: 'hp_update', hp: myPlayer.hp, ghostUntil: myPlayer.ghostUntil });
      break;
    case 'hp_update':
      if (remotePlayers[fromId]) {
        remotePlayers[fromId].hp = data.hp;
        if (data.ghostUntil) remotePlayers[fromId].ghostUntil = data.ghostUntil;
      }
      updatePlayerList();
      break;
    case 'voice_state':
      if (remotePlayers[fromId]) remotePlayers[fromId].voiceOn = data.speaking;
      updatePlayerList();
      break;
    case 'car_enter':
      if (data.carId >= 0 && data.carId < cars.length) {
        cars[data.carId].driverPid = fromId;
        if (remotePlayers[fromId]) remotePlayers[fromId].carId = data.carId;
      }
      break;
    case 'car_exit':
      if (data.carId >= 0 && data.carId < cars.length) {
        cars[data.carId].driverPid = null;
        cars[data.carId].x = data.carX; cars[data.carId].y = data.carY; cars[data.carId].dir = data.carDir;
        if (remotePlayers[fromId]) remotePlayers[fromId].carId = -1;
      }
      break;
    case 'car_move':
      if (data.carId >= 0 && data.carId < cars.length) {
        cars[data.carId].x = data.x; cars[data.carId].y = data.y; cars[data.carId].dir = data.dir;
      }
      break;
    case 'chest_open':
      if (data.chestId >= 0 && data.chestId < chests.length) {
        chests[data.chestId].opened = true;
        if (remotePlayers[fromId]) {
          if (!remotePlayers[fromId].equips) remotePlayers[fromId].equips = [];
          const eq = EQUIP_LIST.find(e => e.id === data.equipId);
          if (eq) {
            remotePlayers[fromId].equips = remotePlayers[fromId].equips.filter(e => EQUIP_LIST.find(d=>d.id===e)?.slot !== eq.slot);
            remotePlayers[fromId].equips.push(data.equipId);
          }
        }
      }
      break;
    case 'equip_sync':
      if (remotePlayers[fromId]) remotePlayers[fromId].equips = data.equips || [];
      break;
    case 'player_left':
      if (data.peerId && remotePlayers[data.peerId]) {
        notify((remotePlayers[data.peerId].name||'Someone') + ' left');
        for (const car of cars) if (car.driverPid === data.peerId) car.driverPid = null;
        delete remotePlayers[data.peerId];
        updatePlayerList();
      }
      break;
  }
}

function makeRemote(p, pid) {
  if (p.avatar && pid) loadRemoteAvatar(pid, p.avatar);
  return { ...p, targetX: p.x, targetY: p.y, hp: p.hp ?? MAX_HP, ghostUntil: p.ghostUntil ?? 0, voiceOn: false, emote: '', emoteTime: 0, equips: p.equips || [] };
}

function connectToPeer(tid) {
  if (!tid || tid === myId || connections[tid]) return;
  const conn = peer.connect(tid, { reliable: true });
  conn.on('open', () => {
    connections[tid] = conn;
    conn.send({ type: 'hello', player: getMyState() });
    updateOnlineCount();
    if (micEnabled) setTimeout(() => callPeer(tid), 500);
  });
  conn.on('data', data => handleData(tid, data));
  conn.on('close', () => handleDisconnect(tid));
}

function getMyState() {
  return { x: myPlayer.x, y: myPlayer.y, dir: myPlayer.dir, frame: myPlayer.frame,
    walking: myPlayer.walking, color: myPlayer.color, name: nameInput.value||'Player',
    hp: myPlayer.hp, ghostUntil: myPlayer.ghostUntil, avatar: myAvatarDataUrl, carId: myPlayer.carId, equips: myPlayer.equips };
}

function getRemotePlayerStates() {
  const out = {};
  for (const [pid, p] of Object.entries(remotePlayers))
    out[pid] = { x:p.x, y:p.y, dir:p.dir, color:p.color, name:p.name, walking:p.walking, hp:p.hp, ghostUntil:p.ghostUntil, avatar:p.avatar };
  return out;
}

function broadcast(data, ex) {
  for (const [id, conn] of Object.entries(connections))
    if (id !== ex && conn.open) conn.send(data);
}

function updateOnlineCount() {
  document.getElementById('online-count').textContent = `${Object.keys(connections).length+1} online`;
}

function notify(text) {
  const el = document.createElement('div');
  el.className = 'notif'; el.textContent = text;
  document.getElementById('notifications').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function updatePlayerList() {
  const c = document.getElementById('pl-entries');
  const hb = hp => '❤️'.repeat(hp) + '🖤'.repeat(MAX_HP - hp);
  let html = `<div class="pl-entry"><span class="pl-dot" style="background:${myPlayer.color}"></span>${nameInput.value||'Player'} (you)${micEnabled?'🔊':''}<span class="pl-hp">${hb(myPlayer.hp)}</span></div>`;
  for (const rp of Object.values(remotePlayers))
    html += `<div class="pl-entry"><span class="pl-dot" style="background:${rp.color||'#888'}"></span>${rp.name||'Player'}${rp.voiceOn?'🔊':''}<span class="pl-hp">${hb(rp.hp??MAX_HP)}</span></div>`;
  c.innerHTML = html;
}

// ─── Emotes ───
function sendEmote(emoji) {
  myPlayer.emote = emoji;
  myPlayer.emoteTime = Date.now();
  broadcast({ type: 'emote', emote: emoji });
}

// ─── Attack ───
let lastAttackTime = 0, damageFlashUntil = 0;

function performAttack() {
  const now = Date.now();
  if (now - lastAttackTime < ATTACK_COOLDOWN || isGhost(myPlayer)) return;

  // if driving, exit the car
  if (myPlayer.carId >= 0) {
    exitCar();
    lastAttackTime = now;
    return;
  }

  // check if near a chest to open
  for (const chest of chests) {
    if (chest.opened) continue;
    const dx = myPlayer.x - chest.x, dy = myPlayer.y - chest.y;
    if (Math.sqrt(dx*dx + dy*dy) < CHEST_RANGE) {
      openChest(chest);
      lastAttackTime = now;
      return;
    }
  }

  // check if near a car to enter
  for (const car of cars) {
    if (car.driverPid) continue;
    const cdx = myPlayer.x - car.x, cdy = myPlayer.y - car.y;
    if (Math.sqrt(cdx*cdx + cdy*cdy) < CAR_INTERACT_RANGE) {
      enterCar(car);
      lastAttackTime = now;
      return;
    }
  }

  // normal attack
  lastAttackTime = now;
  myPlayer.attackTime = now;
  const ax = myPlayer.x, ay = myPlayer.y, dir = myPlayer.dir;
  addAttackEffect(ax, ay, dir);
  broadcast({ type: 'attack', x: ax, y: ay, dir });
  const hb = getAttackBox(ax, ay, dir);
  for (const [pid, rp] of Object.entries(remotePlayers)) {
    if (isGhost(rp)) continue;
    if (rp.x > hb.x1 && rp.x < hb.x2 && rp.y > hb.y1 && rp.y < hb.y2)
      if (connections[pid]?.open) connections[pid].send({ type: 'hit' });
  }
}

function enterCar(car) {
  myPlayer.carId = car.id;
  car.driverPid = 'me';
  myPlayer.x = car.x; myPlayer.y = car.y;
  car.dir = myPlayer.dir;
  broadcast({ type: 'car_enter', carId: car.id });
  notify('🚗 Driving! Space to exit');
}

function exitCar() {
  const car = cars[myPlayer.carId];
  if (!car) return;
  car.driverPid = null;
  // place player next to car
  const offsets = [[0,30],[0,-30],[30,0],[-30,0]];
  for (const [ox, oy] of offsets) {
    if (canMove(car.x + ox, car.y + oy)) { myPlayer.x = car.x + ox; myPlayer.y = car.y + oy; break; }
  }
  broadcast({ type: 'car_exit', carId: myPlayer.carId, carX: car.x, carY: car.y, carDir: car.dir });
  myPlayer.carId = -1;
  notify('Exited car');
}

function openChest(chest) {
  chest.opened = true;
  const eq = EQUIP_LIST.find(e => e.id === chest.equipId);
  if (eq) {
    myPlayer.equips = myPlayer.equips.filter(eid => EQUIP_LIST.find(d=>d.id===eid)?.slot !== eq.slot);
    myPlayer.equips.push(eq.id);
    notify('🎁 Got ' + eq.name + '!');
    addChestEffect(chest.x, chest.y);
  }
  broadcast({ type: 'chest_open', chestId: chest.id, equipId: chest.equipId });
  broadcast({ type: 'equip_sync', equips: myPlayer.equips });
}

const chestEffects = [];
function addChestEffect(x, y) {
  chestEffects.push({ x, y, time: Date.now() });
}

function getAttackBox(x, y, dir) {
  const r = ATTACK_RANGE, w = ATTACK_WIDTH;
  if (dir===0) return {x1:x-w,y1:y+5,x2:x+w,y2:y+5+r};
  if (dir===1) return {x1:x-5-r,y1:y-w,x2:x-5,y2:y+w};
  if (dir===2) return {x1:x+5,y1:y-w,x2:x+5+r,y2:y+w};
  return {x1:x-w,y1:y-5-r,x2:x+w,y2:y-5};
}
function addAttackEffect(x,y,dir) { attackEffects.push({x,y,dir,time:Date.now(),type:'punch'}); }
function addDamageFlash() { damageFlashUntil = Date.now() + 200; }
function isGhost(p) { return p.ghostUntil && Date.now() < p.ghostUntil; }

// ─── Input ───
let chatFocused = false;
chatInput.addEventListener('focus', () => { chatFocused = true; });
chatInput.addEventListener('blur', () => { chatFocused = false; });

chatInput.addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Enter') {
    const text = chatInput.value.trim();
    if (text) { myPlayer.chat = text; myPlayer.chatTime = Date.now(); broadcast({ type:'chat', text }); }
    chatInput.value = ''; chatInput.blur(); chatInput.classList.remove('visible');
    e.preventDefault();
  } else if (e.key === 'Escape') {
    chatInput.value = ''; chatInput.blur(); chatInput.classList.remove('visible');
  }
});

nameInput.addEventListener('keydown', e => e.stopPropagation());
nameInput.addEventListener('change', () => updatePlayerList());

document.addEventListener('keydown', e => {
  if (chatFocused || !gameStarted) return;
  const k = e.key;
  if (k.startsWith('Arrow') || 'wasdWASD'.includes(k)) {
    keys[k.toLowerCase()] = true;
    e.preventDefault();
    return;
  }
  if (k === ' ' || k === '=') { performAttack(); e.preventDefault(); return; }
  if (k === 'Enter') {
    chatInput.classList.add('visible');
    chatInput.focus();
    e.preventDefault();
    return;
  }
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; keys[e.key] = false; });

// ─── Mobile Touch Controls ───
(function initMobileControls() {
  const dirMap = { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' };
  const dpadBtns = document.querySelectorAll('.dpad-btn');
  const activeTouches = {};

  dpadBtns.forEach(btn => {
    const dir = btn.dataset.dir;
    const keyName = dirMap[dir];

    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      for (const t of e.changedTouches) activeTouches[t.identifier] = { btn, keyName };
      keys[keyName] = true;
      btn.classList.add('pressed');
    }, { passive: false });

    btn.addEventListener('touchend', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (activeTouches[t.identifier]?.keyName === keyName) delete activeTouches[t.identifier];
      }
      const stillHeld = Object.values(activeTouches).some(v => v.keyName === keyName);
      if (!stillHeld) { keys[keyName] = false; btn.classList.remove('pressed'); }
    }, { passive: false });

    btn.addEventListener('touchcancel', e => {
      for (const t of e.changedTouches) delete activeTouches[t.identifier];
      keys[keyName] = false;
      btn.classList.remove('pressed');
    });

    btn.addEventListener('mousedown', e => { e.preventDefault(); keys[keyName] = true; btn.classList.add('pressed'); });
    btn.addEventListener('mouseup', () => { keys[keyName] = false; btn.classList.remove('pressed'); });
    btn.addEventListener('mouseleave', () => { keys[keyName] = false; btn.classList.remove('pressed'); });
  });

  const atkBtn = document.getElementById('mobile-atk');
  atkBtn.addEventListener('touchstart', e => { e.preventDefault(); performAttack(); atkBtn.classList.add('pressed'); }, { passive: false });
  atkBtn.addEventListener('touchend', e => { e.preventDefault(); atkBtn.classList.remove('pressed'); }, { passive: false });
  atkBtn.addEventListener('click', e => { e.preventDefault(); performAttack(); });

  const chatBtn = document.getElementById('mobile-chat');
  chatBtn.addEventListener('touchstart', e => { e.preventDefault(); chatBtn.classList.add('pressed'); }, { passive: false });
  chatBtn.addEventListener('touchend', e => {
    e.preventDefault(); chatBtn.classList.remove('pressed');
    chatInput.classList.add('visible'); chatInput.focus();
  }, { passive: false });
  chatBtn.addEventListener('click', e => {
    e.preventDefault(); chatInput.classList.add('visible'); chatInput.focus();
  });

  document.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      const info = activeTouches[t.identifier];
      if (!info) continue;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (el !== info.btn && !info.btn.contains(el)) {
        keys[info.keyName] = false;
        info.btn.classList.remove('pressed');
        const newBtn = el?.closest?.('.dpad-btn');
        if (newBtn && newBtn.dataset.dir) {
          const newKey = dirMap[newBtn.dataset.dir];
          keys[newKey] = true;
          newBtn.classList.add('pressed');
          activeTouches[t.identifier] = { btn: newBtn, keyName: newKey };
        } else {
          delete activeTouches[t.identifier];
        }
      }
    }
  }, { passive: false });
})();

// ─── Collision ───
function canMove(x, y) {
  const pad = 10;
  for (const [cx, cy] of [[x-pad,y-pad],[x+pad,y-pad],[x-pad,y+pad],[x+pad,y+pad]]) {
    const col = Math.floor(cx/TILE), row = Math.floor(cy/TILE);
    if (row<0||row>=MAP_ROWS||col<0||col>=MAP_COLS) return false;
    if (!WALKABLE.has(MAP[row]?.[col])) return false;
  }
  return true;
}

// ─── Update ───
let lastBroadcast = 0;
function update() {
  if (!gameStarted) return;
  if (chatFocused) { myPlayer.walking = false; return; }
  const driving = myPlayer.carId >= 0;
  const spd = driving ? CAR_SPEED : SPEED;
  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['w']) dy = -spd;
  if (keys['ArrowDown'] || keys['s']) dy = spd;
  if (keys['ArrowLeft'] || keys['a']) dx = -spd;
  if (keys['ArrowRight'] || keys['d']) dx = spd;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  myPlayer.walking = !!(dx || dy);
  if (dx || dy) {
    if (canMove(myPlayer.x+dx, myPlayer.y)) myPlayer.x += dx;
    if (canMove(myPlayer.x, myPlayer.y+dy)) myPlayer.y += dy;
    if (Math.abs(dx) > Math.abs(dy)) myPlayer.dir = dx<0?1:2;
    else myPlayer.dir = dy<0?3:0;
    animTick++;
    if (animTick%6===0) myPlayer.frame = (myPlayer.frame+1)%4;
    // sync car position
    if (driving && cars[myPlayer.carId]) {
      const car = cars[myPlayer.carId];
      car.x = myPlayer.x; car.y = myPlayer.y; car.dir = myPlayer.dir;
    }
    const now = Date.now();
    if (now-lastBroadcast > 33) {
      broadcast({type:'move',player:getMyState()});
      if (driving) broadcast({type:'car_move', carId: myPlayer.carId, x: myPlayer.x, y: myPlayer.y, dir: myPlayer.dir});
      lastBroadcast = now;
    }
  }
  for (const p of Object.values(remotePlayers)) {
    if (p.targetX !== undefined) {
      const ddx = p.targetX-p.x, ddy = p.targetY-p.y;
      if (Math.sqrt(ddx*ddx+ddy*ddy)>1) {
        p.x += ddx*0.2; p.y += ddy*0.2; p.walking = true;
        p._at = (p._at||0)+1; if (p._at%6===0) p.frame=((p.frame||0)+1)%4;
      } else { p.x = p.targetX; p.y = p.targetY; p.walking = false; }
    }
  }
  const now = Date.now();
  while (attackEffects.length && now-attackEffects[0].time>350) attackEffects.shift();

  // proximity voice: adjust volume based on distance (10 tiles range)
  updateProximityAudio();
}

const VOICE_RANGE = 10 * TILE; // 10 tiles in pixels
function updateProximityAudio() {
  for (const [pid, audio] of Object.entries(remoteAudios)) {
    const rp = remotePlayers[pid];
    if (!rp) { audio.volume = 0; continue; }
    const dx = myPlayer.x - rp.x, dy = myPlayer.y - rp.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist >= VOICE_RANGE) {
      audio.volume = 0;
    } else {
      audio.volume = Math.max(0, Math.min(1, 1 - dist / VOICE_RANGE));
    }
  }
}

// ─── Drawing ───
const tileDetail = [];
for (let r = 0; r < MAP_ROWS; r++) {
  tileDetail[r] = [];
  for (let c = 0; c < MAP_COLS; c++) tileDetail[r][c] = Math.random();
}

function drawTile(col, row) {
  const x = col*TILE, y = row*TILE;
  const t = MAP[row]?.[col] ?? 0;
  const det = tileDetail[row]?.[col] ?? 0;

  switch (t) {
    case T.FLOOR:
      ctx.fillStyle = (col+row)%2===0 ? '#e8e0d4' : '#e2dace';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.strokeStyle='#d5cdc0'; ctx.strokeRect(x+.5,y+.5,TILE-1,TILE-1);
      break;
    case T.WALL:
      ctx.fillStyle = '#7f8c8d'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#6c7a7b'; ctx.fillRect(x+1,y+1,TILE-2,TILE-2);
      ctx.fillStyle = '#8e9c9d'; ctx.fillRect(x+3,y+3,TILE-10,2);
      break;
    case T.DESK:
      ctx.fillStyle = (col+row)%2===0 ? '#e8e0d4' : '#e2dace';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#b08050'; ctx.fillRect(x+2,y+4,TILE-4,TILE-8);
      ctx.fillStyle = '#c49060'; ctx.fillRect(x+3,y+5,TILE-6,TILE-10);
      ctx.fillStyle = '#a07040'; ctx.fillRect(x+4,y+TILE-6,4,4);
      ctx.fillRect(x+TILE-8,y+TILE-6,4,4);
      break;
    case T.MONITOR:
      ctx.fillStyle = (col+row)%2===0 ? '#e8e0d4' : '#e2dace';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#b08050'; ctx.fillRect(x+2,y+8,TILE-4,TILE-12);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+6,y+2,TILE-12,16);
      ctx.fillStyle = '#3498db';
      const flicker = Math.sin(Date.now()/1000+col*3+row)*0.1+0.9;
      ctx.globalAlpha = flicker;
      ctx.fillRect(x+8,y+4,TILE-16,12);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#555'; ctx.fillRect(x+14,y+18,4,4);
      ctx.fillRect(x+12,y+22,8,2);
      break;
    case T.CARPET:
      ctx.fillStyle = (col+row)%2===0 ? '#5b7fa5' : '#5479a0';
      ctx.fillRect(x,y,TILE,TILE);
      if (det>0.8) { ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fillRect(x+4,y+4,8,8); }
      break;
    case T.CORRIDOR:
      ctx.fillStyle = (col+row)%2===0 ? '#d4cec2' : '#cfc9bd';
      ctx.fillRect(x,y,TILE,TILE);
      if (det>0.92) { ctx.fillStyle='#c5bfb3'; ctx.fillRect(x+12,y+12,4,4); }
      break;
    case T.DOOR:
      ctx.fillStyle = (col+row)%2===0 ? '#d4cec2' : '#cfc9bd';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#a0724a'; ctx.fillRect(x+6,y+2,TILE-12,TILE-4);
      ctx.fillStyle = '#b88458'; ctx.fillRect(x+8,y+4,TILE-16,TILE-8);
      ctx.fillStyle = '#d4a86a'; ctx.fillRect(x+TILE-12,y+14,3,4);
      break;
    case T.WINDOW:
      ctx.fillStyle = '#7f8c8d'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#85c1e9';
      const sky = Math.sin(Date.now()/2000+col*0.5)*0.08+0.92;
      ctx.globalAlpha = sky;
      ctx.fillRect(x+4,y+4,TILE-8,TILE-8);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#6c7a7b';
      ctx.fillRect(x+TILE/2-1,y+3,2,TILE-6);
      ctx.fillRect(x+3,y+TILE/2-1,TILE-6,2);
      break;
    case T.PLANT:
      ctx.fillStyle = (col+row)%2===0 ? '#d4cec2' : '#cfc9bd';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#8B6914'; ctx.fillRect(x+10,y+20,12,10);
      ctx.fillStyle = '#27ae60'; ctx.beginPath(); ctx.arc(x+16,y+16,8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.arc(x+14,y+13,5,0,Math.PI*2); ctx.fill();
      break;
    case T.PANTRY_FLOOR:
      ctx.fillStyle = (col+row)%2===0 ? '#f0e6d3' : '#ece2cf';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.strokeStyle = '#d8cebb'; ctx.strokeRect(x+.5,y+.5,TILE-1,TILE-1);
      break;
    case T.COUNTER:
      ctx.fillStyle = '#f0e6d3'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#95a5a6'; ctx.fillRect(x+1,y+4,TILE-2,TILE-6);
      ctx.fillStyle = '#bdc3c7'; ctx.fillRect(x+2,y+5,TILE-4,4);
      ctx.fillStyle = '#7f8c8d'; ctx.fillRect(x+6,y+16,TILE-12,3);
      break;
    case T.FRIDGE:
      ctx.fillStyle = '#f0e6d3'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#ecf0f1'; ctx.fillRect(x+4,y+2,TILE-8,TILE-4);
      ctx.fillStyle = '#bdc3c7'; ctx.fillRect(x+6,y+4,TILE-12,12);
      ctx.fillStyle = '#95a5a6'; ctx.fillRect(x+6,y+TILE/2,TILE-12,12);
      ctx.fillStyle = '#7f8c8d'; ctx.fillRect(x+TILE-10,y+10,2,6);
      ctx.fillRect(x+TILE-10,y+TILE/2+4,2,6);
      break;
    case T.COFFEE:
      ctx.fillStyle = '#f0e6d3'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#95a5a6'; ctx.fillRect(x+2,y+8,TILE-4,TILE-10);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+6,y+4,TILE-12,TILE-8);
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(x+10,y+6,4,3);
      // steam
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      const st = Math.sin(Date.now()/600+col)*2;
      ctx.fillRect(x+12+st,y+1,2,4);
      ctx.fillRect(x+16+st*0.7,y+2,2,3);
      break;
    case T.CHAIR:
      ctx.fillStyle = (col+row)%2===0 ? '#e8e0d4' : '#e2dace';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#3a3a4a'; ctx.fillRect(x+8,y+10,TILE-16,TILE-14);
      ctx.fillStyle = '#4a4a5e'; ctx.fillRect(x+10,y+6,TILE-20,TILE-12);
      // wheels
      ctx.fillStyle = '#222';
      ctx.fillRect(x+8,y+TILE-6,3,3); ctx.fillRect(x+TILE-11,y+TILE-6,3,3);
      break;
    case T.WHITEBOARD:
      ctx.fillStyle = (col+row)%2===0 ? '#5b7fa5' : '#5479a0';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#ecf0f1'; ctx.fillRect(x+2,y+3,TILE-4,TILE-8);
      ctx.fillStyle = '#bdc3c7'; ctx.fillRect(x+2,y+TILE-6,TILE-4,3);
      // scribbles
      ctx.strokeStyle = '#3498db'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+6,y+10); ctx.lineTo(x+TILE-8,y+12); ctx.stroke();
      ctx.strokeStyle = '#e74c3c';
      ctx.beginPath(); ctx.moveTo(x+6,y+16); ctx.lineTo(x+TILE-10,y+18); ctx.stroke();
      break;
    case T.SOFA:
      ctx.fillStyle = '#f0e6d3'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#8e44ad'; ctx.fillRect(x+2,y+8,TILE-4,TILE-10);
      ctx.fillStyle = '#9b59b6'; ctx.fillRect(x+4,y+10,TILE-8,TILE-14);
      ctx.fillStyle = '#7d3c98'; ctx.fillRect(x+2,y+8,TILE-4,4);
      break;
    case T.TABLE:
      ctx.fillStyle = (col+row)%2===0 ? '#5b7fa5' : '#e8e0d4';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#b08050'; ctx.fillRect(x+2,y+6,TILE-4,TILE-12);
      ctx.fillStyle = '#c49060'; ctx.fillRect(x+3,y+7,TILE-6,TILE-14);
      break;
  }
}

function drawRoomLabels() {
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const rl of roomLabels) {
    const sx = rl.x - camX, sy = rl.y - camY;
    if (sx < -60 || sx > canvas.width+60 || sy < -30 || sy > canvas.height+30) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    const tw = ctx.measureText(rl.label).width;
    ctx.fillRect(rl.x - tw/2 - 4, rl.y - 9, tw + 8, 18);
    ctx.fillStyle = rl.type === 'meeting' ? '#5dade2' : rl.type === 'pantry' ? '#f39c12' : '#ecf0f1';
    ctx.fillText(rl.label, rl.x, rl.y + 1);
  }
}

function drawCar(car) {
  const x = Math.round(car.x), y = Math.round(car.y);
  const c = car.color || '#e74c3c';
  const dir = car.dir;
  ctx.save();
  ctx.translate(x, y);

  // car is roughly 40x24, orient by direction
  if (dir === 1 || dir === 2) {
    // horizontal
    if (dir === 1) ctx.scale(-1, 1);
    // body
    ctx.fillStyle = c;
    ctx.fillRect(-20, -10, 40, 20);
    // windshield
    ctx.fillStyle = '#85c1e9';
    ctx.fillRect(10, -8, 8, 16);
    // roof
    ctx.fillStyle = shadeColor(c, -20);
    ctx.fillRect(-10, -8, 20, 16);
    // wheels
    ctx.fillStyle = '#222';
    ctx.fillRect(-16, -13, 8, 4);
    ctx.fillRect(-16, 9, 8, 4);
    ctx.fillRect(8, -13, 8, 4);
    ctx.fillRect(8, 9, 8, 4);
    // headlights
    ctx.fillStyle = '#f9e79f';
    ctx.fillRect(18, -7, 3, 5);
    ctx.fillRect(18, 2, 3, 5);
  } else {
    // vertical
    if (dir === 3) ctx.scale(1, -1);
    ctx.fillStyle = c;
    ctx.fillRect(-10, -20, 20, 40);
    ctx.fillStyle = '#85c1e9';
    ctx.fillRect(-8, 10, 16, 8);
    ctx.fillStyle = shadeColor(c, -20);
    ctx.fillRect(-8, -10, 16, 20);
    ctx.fillStyle = '#222';
    ctx.fillRect(-13, -16, 4, 8);
    ctx.fillRect(9, -16, 4, 8);
    ctx.fillRect(-13, 8, 4, 8);
    ctx.fillRect(9, 8, 4, 8);
    ctx.fillStyle = '#f9e79f';
    ctx.fillRect(-7, 18, 5, 3);
    ctx.fillRect(2, 18, 5, 3);
  }

  ctx.restore();

  // label if empty
  if (!car.driverPid) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🚗', x, y - 18);
  }
}

function shadeColor(hex, percent) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, Math.max(0, r + Math.round(r * percent / 100)));
  g = Math.min(255, Math.max(0, g + Math.round(g * percent / 100)));
  b = Math.min(255, Math.max(0, b + Math.round(b * percent / 100)));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function drawChest(chest) {
  const x = Math.round(chest.x), y = Math.round(chest.y);
  ctx.save();
  ctx.translate(x, y);
  if (chest.opened) {
    // open chest - darker, lid tilted back
    ctx.fillStyle = '#5D4037'; ctx.fillRect(-12, -4, 24, 14); // base
    ctx.fillStyle = '#4E342E'; ctx.fillRect(-12, -4, 24, 3);  // rim
    ctx.fillStyle = '#6D4C41'; ctx.fillRect(-14, -12, 28, 10); // lid (tilted)
    ctx.fillStyle = '#3E2723'; ctx.fillRect(-14, -12, 28, 2);  // lid top edge
    ctx.fillStyle = '#333';    ctx.fillRect(-2, -4, 4, 4);     // keyhole
  } else {
    // closed chest - golden accents
    ctx.fillStyle = '#8D6E63'; ctx.fillRect(-12, -6, 24, 16);  // body
    ctx.fillStyle = '#6D4C41'; ctx.fillRect(-12, -6, 24, 4);   // lid
    ctx.fillStyle = '#f1c40f'; ctx.fillRect(-13, -3, 26, 2);   // gold band
    ctx.fillStyle = '#f1c40f'; ctx.fillRect(-13, 4, 26, 2);    // gold band bottom
    ctx.fillStyle = '#f39c12'; ctx.fillRect(-3, -1, 6, 5);     // lock
    ctx.fillStyle = '#e67e22'; ctx.fillRect(-1, 0, 2, 3);      // keyhole
    // sparkle
    const t = Date.now() * 0.003;
    ctx.globalAlpha = 0.4 + 0.3 * Math.sin(t + chest.id);
    ctx.fillStyle = '#f9e79f';
    ctx.fillRect(-10 + Math.sin(t*1.3+chest.id)*3, -10, 2, 2);
    ctx.fillRect(8 + Math.cos(t*1.7+chest.id)*3, -8, 2, 2);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawChestEffects() {
  const now = Date.now();
  for (let i = chestEffects.length - 1; i >= 0; i--) {
    const ef = chestEffects[i];
    const elapsed = now - ef.time;
    if (elapsed > 1000) { chestEffects.splice(i, 1); continue; }
    const prog = elapsed / 1000;
    ctx.save();
    ctx.globalAlpha = 1 - prog;
    ctx.font = `${20 + prog * 16}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('🎁', ef.x, ef.y - 20 - prog * 30);
    ctx.restore();
  }
}

function drawEquipment(x, y, dir, equips, frame) {
  if (!equips || equips.length === 0) return;
  const now = Date.now();
  for (const eid of equips) {
    const eq = EQUIP_LIST.find(e => e.id === eid);
    if (!eq) continue;
    ctx.save();
    ctx.translate(x, y);
    switch (eq.id) {
      case 'crown':
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(-7, -24, 14, 5);
        ctx.fillRect(-9, -27, 4, 4); ctx.fillRect(-1, -29, 3, 6); ctx.fillRect(5, -27, 4, 4);
        break;
      case 'helmet':
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(-8, -24, 16, 8);
        ctx.fillStyle = '#95a5a6';
        ctx.fillRect(-6, -26, 12, 4);
        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(-2, -17, 4, 3);
        break;
      case 'halo':
        ctx.strokeStyle = '#f9e79f';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, -26, 10, 3, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(249,231,159,0.3)';
        ctx.beginPath();
        ctx.ellipse(0, -26, 12, 4, 0, 0, Math.PI * 2);
        ctx.stroke();
        break;
      case 'horns':
        ctx.fillStyle = '#c0392b';
        ctx.beginPath(); ctx.moveTo(-8, -20); ctx.lineTo(-12, -30); ctx.lineTo(-4, -22); ctx.fill();
        ctx.beginPath(); ctx.moveTo(8, -20); ctx.lineTo(12, -30); ctx.lineTo(4, -22); ctx.fill();
        break;
      case 'cape': {
        const swing = Math.sin(now * 0.004) * 3;
        ctx.fillStyle = eq.color;
        ctx.beginPath();
        ctx.moveTo(-6, -8); ctx.lineTo(-8 + swing, 12); ctx.lineTo(8 + swing, 12); ctx.lineTo(6, -8);
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.moveTo(-4, -4); ctx.lineTo(-6 + swing, 12); ctx.lineTo(6 + swing, 12); ctx.lineTo(4, -4);
        ctx.fill();
        break;
      }
      case 'armor':
        ctx.fillStyle = '#5dade2';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(-8, -10, 16, 14);
        ctx.fillStyle = '#85c1e9';
        ctx.fillRect(-6, -8, 12, 3);
        ctx.globalAlpha = 1;
        break;
      case 'tux':
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(-7, -8, 14, 12);
        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(-2, -8, 4, 10);
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(-1, -7, 2, 2);
        break;
      case 'wings': {
        const flap = Math.sin(now * 0.006) * 4;
        ctx.fillStyle = 'rgba(174,214,241,0.6)';
        ctx.beginPath();
        ctx.moveTo(-6, -6); ctx.lineTo(-18 - flap, -14); ctx.lineTo(-16 - flap, 2); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(6, -6); ctx.lineTo(18 + flap, -14); ctx.lineTo(16 + flap, 2); ctx.fill();
        break;
      }
      case 'jetpack':
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(-10, -8, 5, 12); ctx.fillRect(5, -8, 5, 12);
        ctx.fillStyle = '#e67e22';
        const flame = 4 + Math.sin(now * 0.02) * 3;
        ctx.fillRect(-9, 4, 3, flame); ctx.fillRect(6, 4, 3, flame);
        break;
      case 'scarf': {
        const sw = Math.sin(now * 0.005) * 4;
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(-7, -12, 14, 4);
        ctx.beginPath();
        ctx.moveTo(6, -10); ctx.lineTo(10 + sw, 0); ctx.lineTo(6 + sw, 2); ctx.lineTo(4, -8);
        ctx.fill();
        break;
      }
      case 'glasses':
        ctx.fillStyle = '#222';
        ctx.fillRect(-7, -18, 6, 4); ctx.fillRect(1, -18, 6, 4);
        ctx.fillRect(-1, -17, 2, 2);
        ctx.fillStyle = 'rgba(50,50,50,0.5)';
        ctx.fillRect(-6, -17, 4, 2); ctx.fillRect(2, -17, 4, 2);
        break;
      case 'mask':
        ctx.fillStyle = '#8e44ad';
        ctx.globalAlpha = 0.7;
        ctx.fillRect(-7, -20, 14, 7);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(-5, -19, 3, 3); ctx.fillRect(2, -19, 3, 3);
        break;
      case 'sword': {
        const angle = dir === 0 ? 0.3 : dir === 3 ? -0.3 : dir === 1 ? -0.8 : 0.8;
        ctx.save();
        ctx.rotate(angle);
        ctx.fillStyle = '#bdc3c7'; ctx.fillRect(7, -14, 3, 16);
        ctx.fillStyle = '#f1c40f'; ctx.fillRect(5, 0, 7, 3);
        ctx.fillStyle = '#8B4513'; ctx.fillRect(7, 3, 3, 5);
        ctx.restore();
        break;
      }
      case 'shield': {
        const sx = dir === 1 ? -12 : dir === 2 ? 8 : -12;
        ctx.fillStyle = '#2980b9';
        ctx.beginPath();
        ctx.moveTo(sx, -8); ctx.lineTo(sx + 10, -8); ctx.lineTo(sx + 10, 2);
        ctx.lineTo(sx + 5, 6); ctx.lineTo(sx, 2); ctx.fill();
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(sx + 3, -5, 4, 4);
        break;
      }
      case 'wand': {
        const angle = dir === 0 ? 0.5 : dir === 3 ? -0.5 : dir === 1 ? -1 : 1;
        ctx.save(); ctx.rotate(angle);
        ctx.fillStyle = '#8B4513'; ctx.fillRect(8, -2, 14, 3);
        ctx.fillStyle = '#f9e79f';
        const sparkle = Math.sin(now * 0.01) * 2;
        ctx.fillRect(20 + sparkle, -5, 4, 4);
        ctx.fillRect(22, -3 + sparkle, 4, 4);
        ctx.restore();
        break;
      }
      case 'boots':
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(-7, 6, 5, 5); ctx.fillRect(2, 6, 5, 5);
        ctx.fillRect(-8, 9, 6, 3); ctx.fillRect(1, 9, 6, 3);
        break;
      case 'sneakers':
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(-7, 6, 5, 4); ctx.fillRect(2, 6, 5, 4);
        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(-7, 9, 6, 2); ctx.fillRect(2, 9, 6, 2);
        break;
      case 'aura_fire': {
        ctx.globalAlpha = 0.25 + 0.1 * Math.sin(now * 0.008);
        const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 22);
        grad.addColorStop(0, 'rgba(231,76,60,0.6)');
        grad.addColorStop(0.5, 'rgba(243,156,18,0.3)');
        grad.addColorStop(1, 'rgba(231,76,60,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        break;
      }
      case 'aura_ice': {
        ctx.globalAlpha = 0.2 + 0.1 * Math.sin(now * 0.006);
        const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 22);
        grad.addColorStop(0, 'rgba(93,173,226,0.5)');
        grad.addColorStop(0.5, 'rgba(174,214,241,0.2)');
        grad.addColorStop(1, 'rgba(93,173,226,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        break;
      }
      case 'aura_gold': {
        ctx.globalAlpha = 0.2 + 0.15 * Math.sin(now * 0.005);
        const grad = ctx.createRadialGradient(0, 0, 4, 0, 0, 24);
        grad.addColorStop(0, 'rgba(241,196,15,0.6)');
        grad.addColorStop(0.5, 'rgba(249,231,159,0.3)');
        grad.addColorStop(1, 'rgba(241,196,15,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        for (let i = 0; i < 5; i++) {
          const a = now * 0.002 + i * 1.256;
          const r = 16 + Math.sin(now*0.003+i)*4;
          ctx.fillStyle = 'rgba(249,231,159,0.7)';
          ctx.fillRect(Math.cos(a)*r - 1, Math.sin(a)*r - 1, 2, 2);
        }
        break;
      }
    }
    ctx.restore();
  }
}

function drawHpBar(x, y, hp) {
  const tw = 32, h = 4, gap = 1;
  const bw = (tw - gap*(MAX_HP-1)) / MAX_HP;
  const sx = x - tw/2;
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(sx-1, y-1, tw+2, h+2);
  for (let i = 0; i < MAX_HP; i++) {
    ctx.fillStyle = i < hp ? (hp>2?'#53d769':hp>1?'#f0ad4e':'#e94560') : '#333';
    ctx.fillRect(sx + i*(bw+gap), y, bw, h);
  }
}

function drawCharacter(p, isMe) {
  const x = Math.round(p.x), y = Math.round(p.y);
  const color = p.color||'#e94560', name = p.name||'Player';
  const frame = p.frame||0, walking = p.walking, ghost = isGhost(p);
  const inCar = (p.carId ?? -1) >= 0;

  // if in car, only draw name/hp/chat above car, skip body
  if (inCar) {
    drawHpBar(x, y-30, p.hp??MAX_HP);
    ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    const tw2 = ctx.measureText(name).width;
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(x-tw2/2-3, y-44, tw2+6, 14);
    ctx.fillStyle = isMe ? '#f0ad4e' : '#fff'; ctx.fillText(name, x, y-33);
    if (p.emote && Date.now()-p.emoteTime < EMOTE_DURATION) {
      const et = (Date.now()-p.emoteTime)/EMOTE_DURATION;
      ctx.save(); ctx.globalAlpha = et<0.1?et/0.1:et>0.7?(1-et)/0.3:1;
      ctx.font = `${Math.round(28*(et<0.15?0.5+et/0.15*0.5:1))}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.emote, x, y-60-et*20); ctx.restore();
    }
    if (p.chat && Date.now()-p.chatTime < CHAT_DURATION) drawChatBubble(x, y-50, p.chat, Math.min(1,(1-(Date.now()-p.chatTime)/CHAT_DURATION)*3));
    return;
  }

  ctx.save();
  if (ghost) ctx.globalAlpha = Math.sin(Date.now()/100)*0.15+0.3;

  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(x,y+15,10,4,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#2c3e50';
  if (walking) {
    const ls = Math.sin(frame*Math.PI/2)*4;
    ctx.fillRect(x-6,y+8+ls,5,8); ctx.fillRect(x+1,y+8-ls,5,8);
  } else { ctx.fillRect(x-6,y+8,5,8); ctx.fillRect(x+1,y+8,5,8); }

  ctx.fillStyle = color; ctx.fillRect(x-8,y-12,16,21);

  // arms: check if punching
  const punching = p.attackTime && (Date.now() - p.attackTime) < 250;
  if (punching) {
    const pt = (Date.now() - p.attackTime) / 250;
    const extend = pt < 0.4 ? pt / 0.4 : 1 - (pt - 0.4) / 0.6;
    const reach = extend * 14;
    if (p.dir === 2) {
      ctx.fillRect(x-11, y-8, 4, 14);
      ctx.fillStyle = '#ffcc99'; ctx.fillRect(x+7+reach, y-6, 6, 6);
      ctx.fillStyle = color; ctx.fillRect(x+7, y-8, 4+reach, 14);
    } else if (p.dir === 1) {
      ctx.fillRect(x+7, y-8, 4, 14);
      ctx.fillStyle = '#ffcc99'; ctx.fillRect(x-13-reach, y-6, 6, 6);
      ctx.fillStyle = color; ctx.fillRect(x-11-reach, y-8, 4+reach, 14);
    } else if (p.dir === 0) {
      ctx.fillRect(x-11, y-8, 4, 14);
      ctx.fillStyle = color; ctx.fillRect(x+7, y-8, 4, 14);
      ctx.fillStyle = '#ffcc99'; ctx.fillRect(x+5, y+4+reach, 6, 6);
      ctx.fillStyle = color; ctx.fillRect(x+7, y-2, 4, 8+reach);
    } else {
      ctx.fillRect(x+7, y-8, 4, 14);
      ctx.fillStyle = color; ctx.fillRect(x-11, y-8, 4, 14);
      ctx.fillStyle = '#ffcc99'; ctx.fillRect(x-13, y-10-reach, 6, 6);
      ctx.fillStyle = color; ctx.fillRect(x-11, y-8-reach, 4, 8+reach);
    }
  } else if (walking) {
    const as = Math.sin(frame*Math.PI/2)*3;
    ctx.fillRect(x-11,y-8+as,4,14); ctx.fillRect(x+7,y-8-as,4,14);
  } else { ctx.fillRect(x-11,y-8,4,14); ctx.fillRect(x+7,y-8,4,14); }

  // head: avatar or default pixel art
  const avatarImg = isMe ? myAvatarImg : (p._pid && remoteAvatarImgs[p._pid]);
  if (avatarImg && avatarImg.complete && avatarImg.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y-16, 10, 0, Math.PI*2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(avatarImg, x-10, y-26, 20, 20);
    ctx.restore();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x, y-16, 10, 0, Math.PI*2); ctx.stroke();
  } else {
    ctx.fillStyle = '#ffcc99'; ctx.fillRect(x-6,y-22,12,11);
    ctx.fillStyle = '#4a3728'; ctx.fillRect(x-7,y-24,14,4);
    ctx.fillStyle = '#333';
    if (p.dir===0) { ctx.fillRect(x-4,y-17,2,3); ctx.fillRect(x+2,y-17,2,3); }
    else if (p.dir===1) ctx.fillRect(x-5,y-17,2,3);
    else if (p.dir===2) ctx.fillRect(x+3,y-17,2,3);
  }

  drawEquipment(x, y, p.dir, p.equips || (isMe ? myPlayer.equips : []), frame);

  ctx.restore();

  drawHpBar(x, y-38, p.hp??MAX_HP);

  ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  const tw = ctx.measureText(name).width;
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(x-tw/2-3, y-52, tw+6, 14);
  ctx.fillStyle = isMe ? '#f0ad4e' : '#fff';
  ctx.fillText(name, x, y-41);

  if ((isMe && micEnabled) || (!isMe && p.voiceOn)) {
    ctx.font = '10px sans-serif'; ctx.fillText('🔊', x+tw/2+10, y-41);
  }

  // emote (big floating emoji)
  if (p.emote && Date.now() - p.emoteTime < EMOTE_DURATION) {
    const et = (Date.now() - p.emoteTime) / EMOTE_DURATION;
    const alpha = et < 0.1 ? et/0.1 : et > 0.7 ? (1-et)/0.3 : 1;
    const floatY = y - 70 - et * 20;
    const scale = et < 0.15 ? 0.5 + et/0.15*0.5 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `${Math.round(28*scale)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.emote, x, floatY);
    ctx.restore();
  }

  // chat bubble
  if (p.chat && Date.now()-p.chatTime < CHAT_DURATION) {
    const rem = 1 - (Date.now()-p.chatTime)/CHAT_DURATION;
    drawChatBubble(x, y-58, p.chat, Math.min(1, rem*3));
  }
}

function drawChatBubble(x, y, text, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.font = '13px sans-serif';
  const tw = ctx.measureText(text).width;
  const pw = tw+18, ph = 24, bx = x-pw/2, by = y-ph-8;
  ctx.fillStyle = '#fff'; ctx.beginPath();
  const r = 8;
  ctx.moveTo(bx+r,by); ctx.lineTo(bx+pw-r,by);
  ctx.quadraticCurveTo(bx+pw,by,bx+pw,by+r); ctx.lineTo(bx+pw,by+ph-r);
  ctx.quadraticCurveTo(bx+pw,by+ph,bx+pw-r,by+ph); ctx.lineTo(bx+r,by+ph);
  ctx.quadraticCurveTo(bx,by+ph,bx,by+ph-r); ctx.lineTo(bx,by+r);
  ctx.quadraticCurveTo(bx,by,bx+r,by); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x-5,by+ph); ctx.lineTo(x,by+ph+7); ctx.lineTo(x+5,by+ph); ctx.fill();
  ctx.fillStyle = '#222'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, by+ph/2);
  ctx.restore();
}

function drawAttackEffects() {
  const now = Date.now();
  for (const ef of attackEffects) {
    const t = (now-ef.time)/350; if (t>1) continue;
    ctx.save();

    let ox=0, oy=0;
    if (ef.dir===0) { ox=ef.x; oy=ef.y+24; }
    else if (ef.dir===1) { ox=ef.x-24; oy=ef.y; }
    else if (ef.dir===2) { ox=ef.x+24; oy=ef.y; }
    else { ox=ef.x; oy=ef.y-24; }

    ctx.translate(ox, oy);
    ctx.globalAlpha = (1-t)*0.9;

    // impact burst lines
    const scale = 0.3 + t * 0.7;
    ctx.scale(scale, scale);
    const spokes = 6;
    for (let i = 0; i < spokes; i++) {
      const angle = (i / spokes) * Math.PI * 2 + t * 2;
      const innerR = 4, outerR = 12 + t * 8;
      ctx.strokeStyle = i % 2 === 0 ? '#ffe082' : '#fff';
      ctx.lineWidth = 3 - t * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle)*innerR, Math.sin(angle)*innerR);
      ctx.lineTo(Math.cos(angle)*outerR, Math.sin(angle)*outerR);
      ctx.stroke();
    }

    // center flash
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = (1-t) * 0.6;
    ctx.beginPath(); ctx.arc(0, 0, 6*(1-t), 0, Math.PI*2); ctx.fill();

    ctx.restore();
  }
}

function draw() {
  if (!gameStarted) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,canvas.width,canvas.height);

  camX = myPlayer.x-canvas.width/2; camY = myPlayer.y-canvas.height/2;
  camX = Math.max(0, Math.min(MAP_W-canvas.width, camX));
  camY = Math.max(0, Math.min(MAP_H-canvas.height, camY));

  ctx.save(); ctx.translate(-Math.round(camX), -Math.round(camY));

  const sc=Math.max(0,Math.floor(camX/TILE)), ec=Math.min(MAP_COLS,Math.ceil((camX+canvas.width)/TILE)+1);
  const sr=Math.max(0,Math.floor(camY/TILE)), er=Math.min(MAP_ROWS,Math.ceil((camY+canvas.height)/TILE)+1);
  for (let r=sr;r<er;r++) for (let c=sc;c<ec;c++) drawTile(c,r);

  // voice range circle
  if (micEnabled) {
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#5dade2';
    ctx.beginPath(); ctx.arc(myPlayer.x, myPlayer.y, VOICE_RANGE, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = '#5dade2'; ctx.lineWidth = 1; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.arc(myPlayer.x, myPlayer.y, VOICE_RANGE, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // collect cars and players, sort by y for depth
  const all = [{...myPlayer, name:nameInput.value||'Player', _isMe:true}];
  for (const [pid, rp] of Object.entries(remotePlayers)) all.push({...rp, _isMe:false, _pid:pid});

  const drawables = [];
  for (const car of cars) drawables.push({ type:'car', y: car.y, car });
  for (const chest of chests) drawables.push({ type:'chest', y: chest.y, chest });
  for (const p of all) drawables.push({ type:'player', y: p.y, p });
  drawables.sort((a,b) => a.y - b.y);

  for (const d of drawables) {
    if (d.type === 'car') drawCar(d.car);
    else if (d.type === 'chest') drawChest(d.chest);
    else drawCharacter(d.p, d.p._isMe);
  }
  drawAttackEffects();
  drawChestEffects();
  drawRoomLabels();
  ctx.restore();

  if (Date.now() < damageFlashUntil) {
    ctx.fillStyle = 'rgba(233,69,96,0.25)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  drawMinimap();
}

function drawMinimap() {
  const mw=160, mh=mw*(MAP_ROWS/MAP_COLS);
  const mx=canvas.width-mw-12, my=12;
  const sx=mw/MAP_W, sy=mh/MAP_H;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(mx-2,my-2,mw+4,mh+4);
  const mmColors = {
    [T.FLOOR]:'#e2dace', [T.WALL]:'#7f8c8d', [T.DESK]:'#b08050', [T.MONITOR]:'#2c3e50',
    [T.CARPET]:'#5b7fa5', [T.CORRIDOR]:'#d4cec2', [T.DOOR]:'#a0724a', [T.WINDOW]:'#85c1e9',
    [T.PLANT]:'#27ae60', [T.PANTRY_FLOOR]:'#f0e6d3', [T.COUNTER]:'#95a5a6', [T.FRIDGE]:'#ecf0f1',
    [T.COFFEE]:'#2c3e50', [T.CHAIR]:'#4a4a5e', [T.WHITEBOARD]:'#ecf0f1', [T.SOFA]:'#8e44ad', [T.TABLE]:'#b08050',
  };
  for (let r=0;r<MAP_ROWS;r++) for (let c=0;c<MAP_COLS;c++) {
    ctx.fillStyle = mmColors[MAP[r][c]] || '#d4cec2';
    ctx.fillRect(mx+c*(mw/MAP_COLS), my+r*(mh/MAP_ROWS), mw/MAP_COLS+.5, mh/MAP_ROWS+.5);
  }
  // chest dots
  for (const chest of chests) {
    if (chest.opened) continue;
    ctx.fillStyle = '#f1c40f';
    ctx.fillRect(mx + chest.x * sx - 1.5, my + chest.y * sy - 1.5, 3, 3);
  }
  // car dots
  for (const car of cars) {
    ctx.fillStyle = car.color || '#888';
    ctx.fillRect(mx+car.x*sx-2, my+car.y*sy-1.5, 4, 3);
  }
  ctx.fillStyle = '#f0ad4e';
  ctx.beginPath(); ctx.arc(mx+myPlayer.x*sx,my+myPlayer.y*sy,3,0,Math.PI*2); ctx.fill();
  for (const rp of Object.values(remotePlayers)) {
    ctx.fillStyle = rp.color||'#5bc0de';
    ctx.beginPath(); ctx.arc(mx+rp.x*sx,my+rp.y*sy,2.5,0,Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
  ctx.strokeRect(mx+camX*sx,my+camY*sy,canvas.width*sx,canvas.height*sy);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
updateOnlineCount();
loop();
</script>
