<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Virtual Office</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; overflow: hidden; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  #top-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; background: #16213e;
    border-bottom: 2px solid #0f3460; z-index: 10; flex-shrink: 0;
  }
  @media (max-width: 768px) {
    #top-bar {
      padding: 4px 8px; gap: 6px;
      flex-wrap: wrap;
    }
    #top-bar input { font-size: 12px; padding: 3px 6px; }
    .bar-label { font-size: 11px; }
    .separator { height: 14px; }
  }
  .bar-label { font-size: 13px; color: #8899aa; }
  .separator { width: 1px; height: 20px; background: #0f3460; }
  #top-bar input {
    font-size: 13px; border: 1px solid #0f3460; border-radius: 6px;
    padding: 5px 10px; background: #1a1a2e; color: #e0e0e0; outline: none;
  }
  #top-bar input:focus { border-color: #e94560; }
  #status { font-size: 12px; color: #53d769; margin-left: auto; }
  #online-count { font-size: 12px; color: #8899aa; }

  #lobby-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,10,20,0.85);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  #lobby-overlay.hidden { display: none; }
  #lobby {
    background: #16213e; border: 2px solid #0f3460; border-radius: 16px;
    padding: 36px 40px; width: 400px; max-width: 92vw; text-align: center;
    max-height: 90vh; max-height: 90dvh; overflow-y: auto;
  }
  #lobby h1 { font-size: 28px; margin-bottom: 6px; color: #fff; }
  #lobby p { font-size: 13px; color: #8899aa; margin-bottom: 24px; }
  #lobby input {
    width: 100%; padding: 10px 14px; font-size: 15px;
    border: 2px solid #0f3460; border-radius: 10px;
    background: #1a1a2e; color: #e0e0e0; outline: none;
    margin-bottom: 12px; text-align: center;
  }
  #lobby input:focus { border-color: #e94560; }
  #lobby input::placeholder { color: #445; }
  .lobby-btn {
    display: block; width: 100%; padding: 12px; font-size: 15px;
    font-weight: 700; border: none; border-radius: 10px;
    cursor: pointer; margin-bottom: 10px; transition: background .2s, transform .1s;
  }
  .lobby-btn:active { transform: scale(0.97); }
  .btn-create { background: #e94560; color: #fff; }
  .btn-create:hover { background: #d63b54; }
  .btn-join { background: #0f3460; color: #e0e0e0; }
  .btn-join:hover { background: #1a4a80; }
  .btn-join:disabled { opacity: 0.4; cursor: not-allowed; }
  #lobby-status { font-size: 13px; color: #e94560; margin-top: 8px; min-height: 20px; }

  .avatar-upload {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 14px;
  }
  .avatar-upload label {
    font-size: 13px; color: #8899aa; cursor: pointer;
  }
  .avatar-preview {
    width: 48px; height: 48px; border-radius: 50%;
    border: 2px solid #0f3460; background: #1a1a2e;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative;
  }
  .avatar-preview img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .avatar-preview .placeholder {
    font-size: 22px; color: #445;
  }
  .avatar-upload-btn {
    padding: 6px 14px; font-size: 13px; font-weight: 600;
    border: 1px solid #0f3460; border-radius: 8px;
    background: #1a1a2e; color: #8899aa; cursor: pointer;
    transition: all .2s;
  }
  .avatar-upload-btn:hover { border-color: #e94560; color: #e94560; }

  .room-code {
    font-size: 18px; color: #f0ad4e; font-weight: 900;
    letter-spacing: 2px; cursor: pointer;
  }
  .room-code:hover { color: #ffc107; }
  .copy-hint {
    font-size: 11px; color: #53d769; opacity: 0;
    transition: opacity .3s; margin-left: 4px;
  }
  .copy-hint.show { opacity: 1; }

  #mic-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid #0f3460; background: #1a1a2e;
    color: #8899aa; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  #mic-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
  #mic-btn:hover { border-color: #e94560; }

  #game-container { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; touch-action: none; }

  #chat-bar {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); z-index: 10;
    display: flex; align-items: center; gap: 8px;
  }
  #chat-input {
    width: 340px; padding: 10px 16px; border-radius: 20px;
    border: 2px solid #0f3460; background: rgba(22,33,62,0.92);
    color: #e0e0e0; font-size: 14px; outline: none; backdrop-filter: blur(6px);
    display: none;
  }
  #chat-input.visible { display: block; }
  #chat-input:focus { border-color: #e94560; }
  #chat-input::placeholder { color: #556; }

  .emote-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid #0f3460; background: rgba(22,33,62,0.92);
    font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px); transition: all .15s;
    user-select: none;
  }
  .emote-btn:hover { border-color: #e94560; transform: scale(1.15); }
  .emote-btn:active { transform: scale(0.95); }

  #help-hint {
    position: absolute; bottom: 72px; left: 50%;
    transform: translateX(-50%); font-size: 12px;
    color: #556; pointer-events: none; text-align: center;
  }

  #notifications {
    position: absolute; top: 10px; left: 50%;
    transform: translateX(-50%); z-index: 20;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    pointer-events: none;
  }
  .notif {
    padding: 6px 16px; background: rgba(22,33,62,0.9);
    border: 1px solid #0f3460; border-radius: 20px;
    font-size: 13px; color: #e0e0e0; backdrop-filter: blur(4px);
    animation: notifIn .3s ease-out, notifOut .5s 2.5s ease-in forwards;
  }
  @keyframes notifIn { from { opacity:0; transform:translateY(-10px); } }
  @keyframes notifOut { to { opacity:0; transform:translateY(-10px); } }

  #player-list {
    position: absolute; top: 10px; left: 10px; z-index: 15;
    background: rgba(22,33,62,0.85); border: 1px solid #0f3460;
    border-radius: 10px; padding: 10px 14px; min-width: 140px;
    backdrop-filter: blur(4px);
  }
  #player-list h3 {
    font-size: 11px; color: #8899aa; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px;
  }
  .pl-entry { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 2px 0; }
  .pl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pl-hp { color: #e94560; font-size: 11px; margin-left: auto; }

  /* ─── Mobile Controls ─── */
  #mobile-controls {
    display: none;
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 30; pointer-events: none;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    justify-content: space-between; align-items: flex-end;
  }
  @media (pointer: coarse), (max-width: 768px) {
    #mobile-controls { display: flex; }
    #help-hint { display: none; }
    #chat-bar { bottom: 180px; }
    #chat-input { width: 260px; font-size: 13px; padding: 8px 12px; }
    #player-list { top: 4px; left: 4px; padding: 6px 8px; min-width: 100px; }
    #player-list h3 { font-size: 10px; margin-bottom: 3px; }
    .pl-entry { font-size: 11px; gap: 4px; }
    .pl-dot { width: 6px; height: 6px; }
  }
  .dpad {
    pointer-events: auto;
    --btn-size: min(13vw, 52px);
    display: grid;
    grid-template-columns: var(--btn-size) var(--btn-size) var(--btn-size);
    grid-template-rows: var(--btn-size) var(--btn-size) var(--btn-size);
    gap: 3px;
  }
  .dpad-btn {
    width: var(--btn-size); height: var(--btn-size); border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.18);
    background: rgba(22,33,62,0.8);
    backdrop-filter: blur(6px);
    color: #ccc; font-size: min(5.5vw, 22px);
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    cursor: pointer;
    transition: background .1s, transform .1s;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: rgba(233,69,96,0.5);
    border-color: #e94560;
    transform: scale(0.93);
  }
  .dpad-center {
    width: var(--btn-size); height: var(--btn-size);
    border-radius: 12px; background: transparent; border: none;
  }
  .action-btns {
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .action-btn {
    --act-size: min(16vw, 62px);
    width: var(--act-size); height: var(--act-size); border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.18);
    background: rgba(22,33,62,0.8);
    backdrop-filter: blur(6px);
    color: #fff; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    cursor: pointer;
    transition: background .1s, transform .1s;
    flex-direction: column; gap: 1px;
  }
  .action-btn .act-icon { font-size: min(5.5vw, 22px); line-height: 1; }
  .action-btn .act-label { font-size: min(2.5vw, 10px); opacity: 0.7; line-height: 1; }
  .action-btn:active, .action-btn.pressed {
    background: rgba(233,69,96,0.5);
    border-color: #e94560;
    transform: scale(0.93);
  }
  .action-btn.btn-atk { border-color: rgba(233,69,96,0.4); }
  .action-btn.btn-chat { border-color: rgba(83,215,105,0.4); }
  .action-row { display: flex; gap: min(3vw, 12px); }

  /* Whiteboard Modal */
  #wb-modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  #wb-modal.open { display: flex; }
  #wb-modal-box {
    background: #16213e; border: 2px solid #0f3460; border-radius: 14px;
    padding: 20px 24px; width: 420px; max-width: 92vw;
  }
  #wb-modal-box h3 { margin: 0 0 12px; color: #ecf0f1; font-size: 16px; }
  #wb-text-input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 2px solid #0f3460; background: #1a1a2e; color: #e0e0e0;
    font-size: 14px; outline: none; margin-bottom: 10px;
  }
  #wb-text-input:focus { border-color: #e94560; }
  #wb-paste-area {
    width: 100%; min-height: 80px; border: 2px dashed #0f3460;
    border-radius: 10px; background: #1a1a2e; color: #556;
    font-size: 13px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px; cursor: pointer; position: relative; overflow: hidden;
    text-align: center; padding: 10px;
  }
  #wb-paste-area.has-image { border-color: #53d769; }
  #wb-paste-area img {
    max-width: 100%; max-height: 120px; border-radius: 6px;
  }
  .wb-btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .wb-btn {
    padding: 8px 18px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .wb-btn-send { background: #e94560; color: #fff; }
  .wb-btn-send:hover { background: #d63b54; }
  .wb-btn-cancel { background: #0f3460; color: #e0e0e0; }
  .wb-btn-cancel:hover { background: #1a4a80; }

  /* Whiteboard Zoom Overlay */
  #wb-zoom {
    display: none; position: fixed; inset: 0; z-index: 250;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; cursor: pointer;
  }
  #wb-zoom.open { display: flex; }
  #wb-zoom-box {
    background: #ecf0f1; border-radius: 14px; padding: 0;
    width: 90vw; max-width: 700px; max-height: 88vh;
    overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    cursor: default;
  }
  #wb-zoom-header {
    background: #2c3e50; color: #ecf0f1; padding: 12px 20px;
    font-size: 16px; font-weight: 700; border-radius: 14px 14px 0 0;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 1;
  }
  #wb-zoom-close {
    background: #e94560; border: none; color: #fff; width: 28px; height: 28px;
    border-radius: 50%; font-size: 16px; cursor: pointer; line-height: 1;
  }
  #wb-zoom-close:hover { background: #d63b54; }
  #wb-zoom-body { padding: 16px 20px; }
  .wb-zoom-entry { margin-bottom: 10px; }
  .wb-zoom-entry.text {
    font: 14px/1.5 monospace; color: #2c3e50; word-break: break-all;
  }
  .wb-zoom-entry.image img {
    max-width: 100%; border-radius: 8px; display: block;
  }
  .wb-zoom-entry .wb-zoom-name {
    font-size: 11px; color: #7f8c8d; margin-bottom: 2px;
  }
</style>
</head>
<body>

<div id="lobby-overlay">
  <div id="lobby">
    <h1>Virtual Office</h1>
    <p>Create a room or join a friend's office</p>
    <div class="avatar-upload">
      <div class="avatar-preview" onclick="document.getElementById('avatar-file').click()" title="Upload avatar">
        <span class="placeholder" id="avatar-placeholder">👤</span>
        <img id="avatar-img-preview" style="display:none">
      </div>
      <div>
        <button class="avatar-upload-btn" onclick="document.getElementById('avatar-file').click()">Upload Avatar</button>
        <div style="font-size:11px;color:#556;margin-top:4px">Optional, replaces head</div>
      </div>
      <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="handleAvatarUpload(this)">
    </div>
    <input id="lobby-name" type="text" placeholder="Your name" maxlength="12">
    <button class="lobby-btn btn-create" onclick="createRoom()">Create Room</button>
    <div style="display:flex;gap:8px">
      <input id="lobby-room" type="text" placeholder="Room code" maxlength="6"
             style="text-transform:uppercase; letter-spacing:2px; font-weight:700">
      <button class="lobby-btn btn-join" id="join-btn" onclick="joinRoom()" style="width:120px;flex-shrink:0" disabled>Join</button>
    </div>
    <div id="lobby-status"></div>
  </div>
</div>

<div id="top-bar">
  <span class="bar-label">Room:</span>
  <span class="room-code" id="room-code" onclick="copyRoomCode()" title="Click to copy">---</span>
  <span class="copy-hint" id="copy-hint">Copied!</span>
  <div class="separator"></div>
  <span class="bar-label">Name:</span>
  <input id="name-input" type="text" placeholder="Name" maxlength="12" style="width:100px">
  <div class="separator"></div>
  <button id="mic-btn" onclick="toggleMic()" title="Toggle voice chat">🎤</button>
  <span id="online-count"></span>
  <span id="status">● Offline</span>
</div>

<div id="game-container">
  <canvas id="canvas"></canvas>
  <div id="notifications"></div>
  <div id="player-list">
    <h3>Players</h3>
    <div id="pl-entries"></div>
  </div>
  <div id="help-hint">Arrows / WASD to move · Space to interact · Enter to chat · 🎤 voice · 🎁 find chests!</div>

  <div id="mobile-controls">
    <div class="dpad">
      <div class="dpad-center"></div>
      <button class="dpad-btn" data-dir="up">▲</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" data-dir="left">◄</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" data-dir="right">►</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" data-dir="down">▼</button>
      <div class="dpad-center"></div>
    </div>
    <div class="action-btns">
      <div class="action-row">
        <button class="action-btn btn-atk" id="mobile-atk">
          <span class="act-icon">👊</span>
          <span class="act-label">ATK</span>
        </button>
        <button class="action-btn btn-chat" id="mobile-chat">
          <span class="act-icon">💬</span>
          <span class="act-label">CHAT</span>
        </button>
      </div>
    </div>
  </div>
  <div id="chat-bar">
    <button class="emote-btn" onclick="sendEmote('⭕')" title="O">⭕</button>
    <button class="emote-btn" onclick="sendEmote('❌')" title="X">❌</button>
    <input id="chat-input" type="text" placeholder="Type message, Enter to send..." maxlength="100">
  </div>
</div>

<div id="wb-zoom" onclick="if(event.target===this)closeWhiteboardZoom()">
  <div id="wb-zoom-box">
    <div id="wb-zoom-header">
      <span>📋 Whiteboard</span>
      <button id="wb-zoom-close" onclick="closeWhiteboardZoom()">&times;</button>
    </div>
    <div id="wb-zoom-body"></div>
  </div>
</div>

<div id="wb-modal">
  <div id="wb-modal-box">
    <h3>📋 Write on Whiteboard</h3>
    <input id="wb-text-input" type="text" placeholder="Type a message..." maxlength="60" autocomplete="off">
    <div id="wb-paste-area" tabindex="0">Ctrl+V / Cmd+V to paste screenshot</div>
    <div class="wb-btn-row">
      <button class="wb-btn wb-btn-cancel" onclick="closeWhiteboardModal()">Cancel</button>
      <button class="wb-btn wb-btn-send" onclick="submitWhiteboard()">Send</button>
    </div>
  </div>
</div>

<div id="audio-container" style="display:none"></div>

<script>
const TILE = 32;
const MAP_COLS = 70;
const MAP_ROWS = 53;
const MAP_W = MAP_COLS * TILE;
const MAP_H = MAP_ROWS * TILE;
const SPEED = 3;
const CHAT_DURATION = 6000;
const EMOTE_DURATION = 3000;
const PEER_PREFIX = 'pxworld-';
const MAX_HP = 4;
const ATTACK_RANGE = 42;
const ATTACK_WIDTH = 34;
const ATTACK_COOLDOWN = 500;
const GHOST_DURATION = 3000;
const COLORS = [
  '#e94560','#53d769','#5bc0de','#f0ad4e','#d9534f',
  '#9b59b6','#1abc9c','#e67e22','#2ecc71','#3498db',
];

// tile types for office map
const T = {
  FLOOR: 0, WALL: 1, DESK: 2, MONITOR: 3, CARPET: 4,
  CORRIDOR: 5, DOOR: 6, WINDOW: 7, PLANT: 8,
  PANTRY_FLOOR: 9, COUNTER: 10, FRIDGE: 11, COFFEE: 12,
  CHAIR: 13, WHITEBOARD: 14, SOFA: 15, TABLE: 16,
};
const WALKABLE = new Set([T.FLOOR, T.CORRIDOR, T.DOOR, T.CARPET, T.PANTRY_FLOOR, T.CHAIR]);

const roomLabels = []; // { x, y, label } for room number rendering

// ─── Seeded Map ───
function seededRandom(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

function generateMap(seed) {
  const rng = seededRandom(seed);
  const map = [];
  roomLabels.length = 0;

  // fill everything with floor
  for (let r = 0; r < MAP_ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < MAP_COLS; c++) map[r][c] = T.FLOOR;
  }

  // outer walls
  for (let r = 0; r < MAP_ROWS; r++)
    for (let c = 0; c < MAP_COLS; c++)
      if (r === 0 || r === MAP_ROWS-1 || c === 0 || c === MAP_COLS-1) map[r][c] = T.WALL;

  // windows on outer walls
  for (let c = 4; c < MAP_COLS-4; c += 5) { map[0][c] = T.WINDOW; map[MAP_ROWS-1][c] = T.WINDOW; }
  for (let r = 4; r < MAP_ROWS-4; r += 5) { map[r][0] = T.WINDOW; map[r][MAP_COLS-1] = T.WINDOW; }

  function fill(r1,c1,r2,c2,t) {
    for (let r=Math.max(1,r1);r<=Math.min(MAP_ROWS-2,r2);r++)
      for (let c=Math.max(1,c1);c<=Math.min(MAP_COLS-2,c2);c++) map[r][c]=t;
  }
  function wallRect(r1,c1,r2,c2) {
    for (let c=c1;c<=c2;c++) { if(r1>=0) map[r1][c]=T.WALL; if(r2<MAP_ROWS) map[r2][c]=T.WALL; }
    for (let r=r1;r<=r2;r++) { if(c1>=0) map[r][c1]=T.WALL; if(c2<MAP_COLS) map[r][c2]=T.WALL; }
  }

  // ═══ LEFT-CENTER: Whiteboard area ═══
  const wbMid = Math.floor(MAP_ROWS / 2);
  const wbTop = wbMid - 4, wbBot = wbMid + 4;
  for (let r = wbTop; r <= wbBot; r++) map[r][1] = T.WHITEBOARD;

    }
  }
  roomLabels.push({ x:(deskC1+8)*TILE, y:(deskR1-1)*TILE+TILE/2, label:'Desks', type:'office' });

  // ═══ BOTTOM-LEFT: Pantry ═══
  const ptR1=MAP_ROWS-14, ptC1=1, ptR2=MAP_ROWS-2, ptC2=18;
  wallRect(ptR1,ptC1,ptR2,ptC2);
  fill(ptR1+1,ptC1+1,ptR2-1,ptC2-1,T.PANTRY_FLOOR);

  map[Math.floor((ptR1+ptR2)/2)][ptC2]=T.DOOR;
  for (let c=ptC1+1;c<ptC2;c++) map[ptR1+1][c]=T.COUNTER;
  map[ptR1+1][ptC1+1]=T.FRIDGE; map[ptR1+1][ptC2-1]=T.COFFEE;
  const ptMidR=Math.floor((ptR1+ptR2)/2)+1;
  map[ptMidR][ptC1+3]=T.TABLE; map[ptMidR][ptC1+4]=T.TABLE;
  map[ptMidR-1][ptC1+3]=T.CHAIR; map[ptMidR+1][ptC1+4]=T.CHAIR;
  map[ptMidR][ptC1+8]=T.TABLE; map[ptMidR][ptC1+9]=T.TABLE;
  map[ptMidR-1][ptC1+8]=T.CHAIR; map[ptMidR+1][ptC1+9]=T.CHAIR;
  map[ptR2-2][ptC1+2]=T.SOFA; map[ptR2-2][ptC1+3]=T.SOFA;
  roomLabels.push({ x:(ptC1+ptC2)/2*TILE+TILE/2, y:ptR1*TILE+TILE/2, label:'Pantry', type:'pantry' });

  // ═══ Plants & decoration ═══
  const plantSpots=[[15,10],[15,25],[20,15],[25,8],[12,30],[18,20]];
  for (const [pr,pc] of plantSpots)
    if(pr>0&&pr<MAP_ROWS-1&&pc>0&&pc<MAP_COLS-1&&map[pr][pc]===T.FLOOR) map[pr][pc]=T.PLANT;

  // spawn area
  const midR=MAP_ROWS/2|0, midC=MAP_COLS/2|0;
  for (let r=midR-2;r<=midR+2;r++)
    for (let c=midC-2;c<=midC+2;c++)
      if(r>0&&r<MAP_ROWS-1&&c>0&&c<MAP_COLS-1) map[r][c]=T.FLOOR;

  // clear area for reset switch (below spawn)
  for (let r=midR+2;r<=midR+5;r++)
    for (let c=midC-2;c<=midC+2;c++)
      if(r>0&&r<MAP_ROWS-1&&c>0&&c<MAP_COLS-1) map[r][c]=T.FLOOR;

  // clear area for boss NPC (top center, row 13)
  for (let r=9;r<=17;r++)
    for (let c=midC-4;c<=midC+4;c++)
      if(r>0&&r<MAP_ROWS-1&&c>0&&c<MAP_COLS-1) map[r][c]=T.FLOOR;

  return map;
}

const NUM_CHESTS = 20;
const CHEST_RANGE = 45;
let chests = []; // { id, x, y, opened, equipId }

function generateChests(seed) {
  const rng = seededRandom(seed + 999);
  const result = [];
  for (let i = 0; i < NUM_CHESTS; i++) {
    let cx, cy, attempts = 0;
    do {
      cx = 6 + Math.floor(rng() * (MAP_COLS - 12));
      cy = 6 + Math.floor(rng() * (MAP_ROWS - 12));
      attempts++;
    } while (!WALKABLE.has(MAP[cy]?.[cx]) && attempts < 300);
    const equipIdx = Math.floor(rng() * EQUIP_LIST.length);
    result.push({
      id: i,
      x: cx * TILE + TILE / 2,
      y: cy * TILE + TILE / 2,
      opened: false,
      equipId: EQUIP_LIST[equipIdx].id,
    });
  }
  return result;
}

  x: (MAP_COLS / 2 | 0) * TILE + TILE / 2,

};
const SWITCH_RANGE = 50;

function isNearSwitch(px, py) {

function resetAllChests() {

const BOSS_RANGE = 5 * TILE;
const boss = {

  angry: false, angryUntil: 0,

};
const BOSS_YELLS = [
  '😡 Who told you to slack off!?',

  '💢 Deadline is TOMORROW!!',
  '😤 You think this is a game!?',

function drawBoss() {
  const x = Math.round(boss.x), y = Math.round(boss.y);
  const now = Date.now();
  const anyNear = isNearBoss(myPlayer.x, myPlayer.y) ||
    Object.values(remotePlayers).some(rp => isNearBoss(rp.x, rp.y));
  boss.angry = anyNear;
  if (anyNear) boss.angryUntil = now + 2000;
  const isAngry = now < boss.angryUntil;

  ctx.save();
  ctx.translate(x, y);
  const scale = 4;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0, 15*scale, 12*scale, 5*scale, 0, 0, Math.PI*2); ctx.fill();

  // body (suit)
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(-6*scale, -2*scale, 12*scale, 16*scale);

  // tie
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(-1*scale, -1*scale, 2*scale, 8*scale);

  // legs
  ctx.fillStyle = '#1a252f';
  const walk = isAngry ? Math.sin(now * 0.008) * 2 : 0;
  ctx.fillRect(-5*scale, 12*scale + walk, 4*scale, 6*scale);
  ctx.fillRect(1*scale, 12*scale - walk, 4*scale, 6*scale);

  // arms
  const armSwing = isAngry ? Math.sin(now * 0.012) * 15 : 0;
  ctx.save();
  ctx.translate(-7*scale, 0);
  ctx.rotate(armSwing * Math.PI / 180);
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(-1*scale, 0, 3*scale, 10*scale);
  ctx.fillStyle = '#f5cba7';
  ctx.fillRect(-1*scale, 8*scale, 3*scale, 3*scale);
  ctx.restore();

  ctx.save();
  ctx.translate(7*scale, 0);
  ctx.rotate(-armSwing * Math.PI / 180);
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(-2*scale, 0, 3*scale, 10*scale);
  ctx.fillStyle = '#f5cba7';
  ctx.fillRect(-2*scale, 8*scale, 3*scale, 3*scale);
  ctx.restore();

  // head
  const headShake = isAngry ? Math.sin(now * 0.015) * 3 : 0;
  ctx.save();
  ctx.translate(headShake, 0);
  ctx.fillStyle = '#f5cba7';
  ctx.fillRect(-5*scale, -12*scale, 10*scale, 11*scale);

  // hair (balding)
  ctx.fillStyle = '#5d4e37';
  ctx.fillRect(-5*scale, -12*scale, 10*scale, 3*scale);
  ctx.fillRect(-5*scale, -12*scale, 2*scale, 5*scale);
  ctx.fillRect(3*scale, -12*scale, 2*scale, 5*scale);

  // eyes
  if (isAngry) {
    // angry eyebrows
    ctx.fillStyle = '#333';
    ctx.save(); ctx.translate(-3*scale, -7*scale); ctx.rotate(-0.3);
    ctx.fillRect(0, 0, 3*scale, 1*scale); ctx.restore();
    ctx.save(); ctx.translate(1*scale, -8*scale); ctx.rotate(0.3);
    ctx.fillRect(0, 0, 3*scale, 1*scale); ctx.restore();
    // angry eyes
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(-4*scale, -7*scale, 2*scale, 2*scale);
    ctx.fillRect(2*scale, -7*scale, 2*scale, 2*scale);
    // mouth
    ctx.fillStyle = '#333';
    ctx.fillRect(-3*scale, -3*scale, 6*scale, 2*scale);
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(-2*scale, -3*scale, 4*scale, 1*scale);
  } else {
    ctx.fillStyle = '#333';
    ctx.fillRect(-4*scale, -7*scale, 2*scale, 2*scale);
    ctx.fillRect(2*scale, -7*scale, 2*scale, 2*scale);
    ctx.fillStyle = '#333';
    ctx.fillRect(-2*scale, -3*scale, 4*scale, 1*scale);
  }
  ctx.restore(); // head shake restore

  // name tag (relative coords, inside scale)
  ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#e74c3c';
  ctx.fillText('👔 Boss', 0, -14*scale - 8);

  // angry speech bubble
  if (isAngry && now - boss.lastYell > 3000) {
    boss.lastYell = now;
    boss.yellText = BOSS_YELLS[Math.floor(Math.random() * BOSS_YELLS.length)];
  }
  if (isAngry && boss.yellText) {
    const elapsed = (now - boss.lastYell) / 3000;
    const alpha = elapsed < 0.1 ? elapsed / 0.1 : elapsed > 0.7 ? (1-elapsed)/0.3 : 1;
    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.font = 'bold 14px sans-serif';
    const tw = ctx.measureText(boss.yellText).width;
    const bw = tw + 24, bh = 32;
    const bx = -bw/2, by = -14*scale - 46;
    ctx.fillStyle = '#fff';
    const r = 10;
    ctx.beginPath();
    ctx.moveTo(bx+r, by); ctx.lineTo(bx+bw-r, by);
    ctx.quadraticCurveTo(bx+bw, by, bx+bw, by+r); ctx.lineTo(bx+bw, by+bh-r);
    ctx.quadraticCurveTo(bx+bw, by+bh, bx+bw-r, by+bh); ctx.lineTo(bx+r, by+bh);
    ctx.quadraticCurveTo(bx, by+bh, bx, by+bh-r); ctx.lineTo(bx, by+r);
    ctx.quadraticCurveTo(bx, by, bx+r, by);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5, by+bh); ctx.lineTo(0, by+bh+8); ctx.lineTo(5, by+bh);
    ctx.fillStyle='#fff'; ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#c0392b'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(boss.yellText, 0, by + bh/2);
    ctx.restore();
  }

  ctx.restore(); // outer scale restore
}

// ─── Whiteboard ───
const WB_MAX_ENTRIES = 20;
const WB_INTERACT_RANGE = 60;
let whiteboardEntries = []; // { type:'text'|'image', content:string, name:string }
const wbImageCache = {}; // data url -> Image object
const wbMidRow = Math.floor(MAP_ROWS / 2);
const wbArea = { r1: wbMidRow - 4, r2: wbMidRow + 4, c: 1 };

function isNearWhiteboard(px, py) {
  const wbX = wbArea.c * TILE + TILE/2;
  const wbYmid = ((wbArea.r1 + wbArea.r2) / 2) * TILE + TILE/2;
  const dx = px - wbX, dy = py - wbYmid;
  return Math.sqrt(dx*dx + dy*dy) < WB_INTERACT_RANGE * 2;
}

function addWhiteboardEntry(entry) {
  whiteboardEntries.push(entry);
  if (whiteboardEntries.length > WB_MAX_ENTRIES) whiteboardEntries.shift();
  broadcast({ type: 'wb_write', entries: whiteboardEntries });
}

let wbPendingImage = null;

function openWhiteboardModal() {
  wbPendingImage = null;
  const modal = document.getElementById('wb-modal');
  const input = document.getElementById('wb-text-input');
  const pasteArea = document.getElementById('wb-paste-area');
  pasteArea.innerHTML = 'Ctrl+V / Cmd+V to paste screenshot';
  pasteArea.classList.remove('has-image');
  input.value = '';
  modal.classList.add('open');
  input.focus();
}

function closeWhiteboardModal() {
  document.getElementById('wb-modal').classList.remove('open');
  wbPendingImage = null;
}

function submitWhiteboard() {
  const text = document.getElementById('wb-text-input').value.trim();
  const name = nameInput.value || 'Player';
  if (wbPendingImage) {
    addWhiteboardEntry({ type: 'image', content: wbPendingImage, name });
  }
  if (text) {
    addWhiteboardEntry({ type: 'text', content: name + ': ' + text, name });
  }
  closeWhiteboardModal();
}

// paste handler for whiteboard modal
document.addEventListener('paste', e => {
  if (!document.getElementById('wb-modal').classList.contains('open')) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          // resize to fit whiteboard (max 200x120)
          const maxW = 200, maxH = 120;
          let w = img.width, h = img.height;
          if (w > maxW) { h = h * maxW / w; w = maxW; }
          if (h > maxH) { w = w * maxH / h; h = maxH; }
          const c = document.createElement('canvas');
          c.width = Math.round(w); c.height = Math.round(h);
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          wbPendingImage = c.toDataURL('image/jpeg', 0.5);
          const pasteArea = document.getElementById('wb-paste-area');
          pasteArea.innerHTML = '<img src="' + wbPendingImage + '">';
          pasteArea.classList.add('has-image');
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
});

// enter to submit in whiteboard modal
document.getElementById('wb-text-input').addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Enter') { submitWhiteboard(); e.preventDefault(); }
  else if (e.key === 'Escape') { closeWhiteboardModal(); }
});

const NUM_CARS = 4;
let cars = []; // { id, x, y, dir, driverPid: null }

function generateCars(seed) {
  const rng = seededRandom(seed + 777);
  const result = [];
  for (let i = 0; i < NUM_CARS; i++) {
    let cx, cy, attempts = 0;
    do {
      cx = 4 + Math.floor(rng() * (MAP_COLS - 8));
      cy = 4 + Math.floor(rng() * (MAP_ROWS - 8));
      attempts++;
    } while (!WALKABLE.has(MAP[cy]?.[cx]) && attempts < 200);
    result.push({
      id: i,
      x: cx * TILE + TILE / 2,
      y: cy * TILE + TILE / 2,
      dir: Math.floor(rng() * 4),
      driverPid: null,
      color: ['#e74c3c','#3498db','#f1c40f','#2ecc71'][i],
    });
  }
  return result;
}

// ─── Voice Chat ───
let silentStream = null;

function ensureSilentStream() {
  if (silentStream) return silentStream;
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    ac.resume();
    const dest = ac.createMediaStreamDestination();
    // connect nothing to dest → produces pure silence with no oscillator artifacts
    silentStream = dest.stream;
  } catch (e) {
    console.warn('Could not create silent stream:', e);
  }
  return silentStream;
}

async function toggleMic() {
  if (micEnabled) {
    micEnabled = false;
    micBtn.classList.remove('active');
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    for (const [pid, call] of Object.entries(mediaCalls)) { call.close(); delete mediaCalls[pid]; }
    broadcast({ type: 'voice_state', speaking: false });
    notify('Mic off');
  } else {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
        video: false,
      });
      micEnabled = true;
      micBtn.classList.add('active');
      broadcast({ type: 'voice_state', speaking: true });
      for (const pid of Object.keys(connections)) callPeer(pid);
      notify('Mic on');
    } catch (e) {
      notify('Microphone access denied');
      console.error('Mic error:', e);
    }
  }
  updatePlayerList();
}

function callPeer(pid) {
  if (!localStream || !peer) return;
  if (mediaCalls[pid]) { mediaCalls[pid].close(); delete mediaCalls[pid]; }
  try {
    const call = peer.call(pid, localStream);
    if (!call) return;
    mediaCalls[pid] = call;
    call.on('stream', stream => playRemoteAudio(pid, stream));
    call.on('close', () => { delete mediaCalls[pid]; removeRemoteAudio(pid); });
    call.on('error', err => console.error('Call error:', pid, err));
  } catch (e) { console.error('Call failed:', pid, e); }
}

function handleIncomingCall(call) {
  const pid = call.peer;
  if (mediaCalls[pid]) { mediaCalls[pid].close(); delete mediaCalls[pid]; }
  const stream = localStream || ensureSilentStream();
  if (!stream) { console.warn('No stream to answer with'); return; }
  call.answer(stream);
  mediaCalls[pid] = call;
  call.on('stream', s => playRemoteAudio(pid, s));
  call.on('close', () => { delete mediaCalls[pid]; removeRemoteAudio(pid); });
  call.on('error', err => console.error('Incoming call error:', pid, err));
}

function playRemoteAudio(pid, stream) {
  // skip if it's our own stream echoing back
  if (pid === myId) return;
  // skip if same stream already playing
  if (remoteAudios[pid]?.srcObject === stream) return;
  removeRemoteAudio(pid);
  const audio = document.createElement('audio');
  audio.srcObject = stream;
  audio.autoplay = true;
  audio.playsInline = true;
  audio.volume = 1.0;
  audio.id = 'audio-' + pid;
  audioContainer.appendChild(audio);
  remoteAudios[pid] = audio;
  const p = audio.play();
  if (p) p.catch(() => {
    const resume = () => { audio.play().catch(()=>{}); document.removeEventListener('click', resume); document.removeEventListener('keydown', resume); };
    document.addEventListener('click', resume);
    document.addEventListener('keydown', resume);
  });
}

function removeRemoteAudio(pid) {
  if (remoteAudios[pid]) {
    remoteAudios[pid].pause();
    remoteAudios[pid].srcObject = null;
    remoteAudios[pid].remove();
    delete remoteAudios[pid];
  }
}

};

function setupPeerListeners(targetHostId) {
  peer.on('open', id => {
    myId = id;
    if (!knownPeerIds.includes(id)) knownPeerIds.push(id);
    document.getElementById('status').textContent = '● Online';
    document.getElementById('status').style.color = '#53d769';
    if (targetHostId) {
      const conn = peer.connect(targetHostId, { reliable: true });
      conn.on('open', () => { connections[targetHostId] = conn; conn.send({ type: 'join', player: getMyState() }); });
      conn.on('data', data => handleData(targetHostId, data));
      conn.on('close', () => handleDisconnect(targetHostId));
      conn.on('error', () => setLobbyStatus('Connection failed', true));
    } else { startGame(); }
  });

  peer.on('connection', conn => {
    const pid = conn.peer;
    conn.on('open', () => {
      connections[pid] = conn;
      if (!knownPeerIds.includes(pid)) knownPeerIds.push(pid);
      conn.send({
        type: 'welcome', mapSeed,
        hostPlayer: getMyState(),
        players: getRemotePlayerStates(),
        peers: Object.keys(connections).filter(i => i !== pid),
        cars, chests, whiteboardEntries,
        knownPeerIds,
      });
      updateOnlineCount(); updatePlayerList();
    });
    conn.on('data', data => handleData(pid, data));
    conn.on('close', () => handleDisconnect(pid));
  });

  peer.on('call', call => handleIncomingCall(call));

  peer.on('error', err => {
    console.error('Peer error:', err);
    if (!gameStarted) {
      if (err.type === 'unavailable-id') setLobbyStatus('Room code taken, try again', true);
      else if (err.type === 'peer-unavailable') setLobbyStatus('Room not found', true);
      else setLobbyStatus('Error: ' + err.type, true);
    }
    document.getElementById('status').textContent = '● Error';
    document.getElementById('status').style.color = '#e94560';
  });
}

function initPeer(customId, targetHostId) {
  peer = customId
    ? new Peer(customId, { debug: 0, config: iceConfig })
    : new Peer({ debug: 0, config: iceConfig });
  setupPeerListeners(targetHostId);
}

function handleDisconnect(pid) {
  const name = remotePlayers[pid]?.name || 'Someone';
  delete connections[pid]; delete remotePlayers[pid];
  delete remoteAvatarImgs[pid];
  for (const car of cars) if (car.driverPid === pid) car.driverPid = null;
  if (mediaCalls[pid]) { mediaCalls[pid].close(); delete mediaCalls[pid]; }
  removeRemoteAudio(pid);
  updateOnlineCount(); updatePlayerList();
  if (gameStarted) notify(name + ' left');

  // host migration: if the host left, elect a new one
  const wasHost = (pid === hostPeerId);
  if (wasHost && gameStarted && Object.keys(connections).length >= 0) {
    // remaining peers sorted alphabetically; first one becomes new host
    const candidates = Object.keys(connections).concat([myId]).sort();
    if (candidates[0] === myId) {
      becomeHost();
    }
  }
}

function becomeHost() {
  if (isHost) return;
  isHost = true;
  notify('You are now the room host');
  console.log('Host migration: becoming host, re-registering as', hostPeerId);

  // save current connections and state
  const existingPeers = Object.keys(connections);

  // destroy old peer and create new one with host ID
  if (peer) { peer.destroy(); peer = null; }
  // clear connection references (will reconnect)
  for (const pid of Object.keys(connections)) delete connections[pid];

  peer = new Peer(hostPeerId, { debug: 0, config: iceConfig });
  setupPeerListeners(null);

  peer.on('open', () => {
    myId = hostPeerId;
    // reconnect to all known peers
    for (const pid of existingPeers) {
      if (pid === hostPeerId || pid === myId) continue;
      connectToPeer(pid);
    }
    // re-establish voice
    if (micEnabled) {
      setTimeout(() => {
        for (const pid of Object.keys(connections)) callPeer(pid);
      }, 1000);
    }
  });
}

function handleData(fromId, data) {
  switch (data.type) {
    case 'welcome':
      mapSeed = data.mapSeed; MAP = generateMap(mapSeed);
      cars = data.cars || generateCars(mapSeed);
      chests = data.chests || generateChests(mapSeed);
      if (data.whiteboardEntries) whiteboardEntries = data.whiteboardEntries;
      else if (data.whiteboardLines) whiteboardEntries = data.whiteboardLines.map(l => ({ type:'text', content:l, name:'' }));
      if (data.knownPeerIds) for (const pid of data.knownPeerIds) if (!knownPeerIds.includes(pid)) knownPeerIds.push(pid);
      if (data.hostPlayer) remotePlayers[fromId] = makeRemote(data.hostPlayer, fromId);
      if (data.players) for (const [pid, ps] of Object.entries(data.players)) remotePlayers[pid] = makeRemote(ps, pid);
      if (data.peers) data.peers.forEach(pid => { if (pid !== myId && !connections[pid]) connectToPeer(pid); });
      startGame();
      break;
    case 'join':
      if (data.player) {
        if (!knownPeerIds.includes(fromId)) knownPeerIds.push(fromId);
        remotePlayers[fromId] = makeRemote(data.player, fromId);
        notify(data.player.name + ' joined!');
        updatePlayerList();
        broadcast({ type: 'player_joined', peerId: fromId, player: data.player }, fromId);
        if (micEnabled) setTimeout(() => callPeer(fromId), 500);
      }
      break;
    case 'player_joined':
      if (data.player && data.peerId !== myId) {
        remotePlayers[data.peerId] = makeRemote(data.player, data.peerId);
        if (!connections[data.peerId]) connectToPeer(data.peerId);
        updatePlayerList();
      }
      break;
    case 'hello':
      if (data.player) {
        remotePlayers[fromId] = makeRemote(data.player, fromId);
        if (connections[fromId]) connections[fromId].send({ type: 'hello_ack', player: getMyState() });
        updatePlayerList();
        if (micEnabled) setTimeout(() => callPeer(fromId), 500);
      }
      break;
    case 'hello_ack':
      if (data.player) { remotePlayers[fromId] = makeRemote(data.player, fromId); updatePlayerList(); }
      break;
    case 'move': {
      if (!remotePlayers[fromId]) remotePlayers[fromId] = makeRemote(data.player, fromId);
      const rp = remotePlayers[fromId];
      rp.targetX = data.player.x; rp.targetY = data.player.y;
      rp.dir = data.player.dir; rp.walking = data.player.walking;
      rp.color = data.player.color; rp.name = data.player.name;
      break;
    }
    case 'chat':
      if (remotePlayers[fromId]) { remotePlayers[fromId].chat = data.text; remotePlayers[fromId].chatTime = Date.now(); }
      break;
    case 'chatImage':
      if (remotePlayers[fromId]) { remotePlayers[fromId].chatImage = data.image; remotePlayers[fromId].chatImageTime = Date.now(); }
      break;
    case 'emote':
      if (remotePlayers[fromId]) { remotePlayers[fromId].emote = data.emote; remotePlayers[fromId].emoteTime = Date.now(); }
      break;
    case 'attack':
      if (remotePlayers[fromId]) {
        remotePlayers[fromId].attacking = true;
        remotePlayers[fromId].attackTime = Date.now();
        addAttackEffect(data.x, data.y, data.dir);
      }
      break;
    case 'hit':
      myPlayer.hp = Math.max(0, myPlayer.hp - 1);
      addDamageFlash();
      if (myPlayer.hp <= 0) {
        myPlayer.ghostUntil = Date.now() + GHOST_DURATION;
        myPlayer.hp = 0;
        setTimeout(() => {
          myPlayer.hp = MAX_HP;
          myPlayer.x = MAP_W/2 + (Math.random()-.5)*200;
          myPlayer.y = MAP_H/2 + (Math.random()-.5)*200;
          broadcast({ type: 'move', player: getMyState() });
          broadcast({ type: 'hp_update', hp: myPlayer.hp });
        }, GHOST_DURATION);
      }
      broadcast({ type: 'hp_update', hp: myPlayer.hp, ghostUntil: myPlayer.ghostUntil });
      break;
    case 'hp_update':
      if (remotePlayers[fromId]) {
        remotePlayers[fromId].hp = data.hp;
        if (data.ghostUntil) remotePlayers[fromId].ghostUntil = data.ghostUntil;
      }
      updatePlayerList();
      break;
    case 'voice_state':
      if (remotePlayers[fromId]) remotePlayers[fromId].voiceOn = data.speaking;
      updatePlayerList();
      break;
    case 'car_enter':
      if (data.carId >= 0 && data.carId < cars.length) {
        cars[data.carId].driverPid = fromId;
        if (remotePlayers[fromId]) remotePlayers[fromId].carId = data.carId;
      }
      break;
    case 'car_exit':
      if (data.carId >= 0 && data.carId < cars.length) {
        cars[data.carId].driverPid = null;
        cars[data.carId].x = data.carX; cars[data.carId].y = data.carY; cars[data.carId].dir = data.carDir;
        if (remotePlayers[fromId]) remotePlayers[fromId].carId = -1;
      }
      break;
    case 'car_move':
      if (data.carId >= 0 && data.carId < cars.length) {
        cars[data.carId].x = data.x; cars[data.carId].y = data.y; cars[data.carId].dir = data.dir;
      }
      break;
    case 'chest_reset':
      if (data.chests) {
        for (let i = 0; i < data.chests.length && i < chests.length; i++) {
          chests[i].opened = data.chests[i].opened;
          chests[i].equipId = data.chests[i].equipId;
        }
        notify('🔄 Chests have been reset!');
      }
      break;
    case 'chest_open':
      if (data.chestId >= 0 && data.chestId < chests.length) {
        chests[data.chestId].opened = true;
        if (remotePlayers[fromId]) {
          if (!remotePlayers[fromId].equips) remotePlayers[fromId].equips = [];
          const eq = EQUIP_LIST.find(e => e.id === data.equipId);
          if (eq) {
            remotePlayers[fromId].equips = remotePlayers[fromId].equips.filter(e => EQUIP_LIST.find(d=>d.id===e)?.slot !== eq.slot);
            remotePlayers[fromId].equips.push(data.equipId);
          }
        }
      }
      break;
    case 'equip_sync':
      if (remotePlayers[fromId]) remotePlayers[fromId].equips = data.equips || [];
      break;
    case 'wb_write':
      if (data.entries) whiteboardEntries = data.entries.slice(-WB_MAX_ENTRIES);
      else if (data.lines) whiteboardEntries = data.lines.map(l => ({ type:'text', content:l, name:'' }));
      break;
    case 'player_left':
      if (data.peerId && remotePlayers[data.peerId]) {
        notify((remotePlayers[data.peerId].name||'Someone') + ' left');
        for (const car of cars) if (car.driverPid === data.peerId) car.driverPid = null;
        delete remotePlayers[data.peerId];
        updatePlayerList();
      }
      break;
  }
}

function makeRemote(p, pid) {
  if (p.avatar && pid) loadRemoteAvatar(pid, p.avatar);
  return { ...p, targetX: p.x, targetY: p.y, hp: p.hp ?? MAX_HP, ghostUntil: p.ghostUntil ?? 0, voiceOn: false, emote: '', emoteTime: 0, chatImage: '', chatImageTime: 0, equips: p.equips || [] };
}

function connectToPeer(tid) {
  if (!tid || tid === myId || connections[tid]) return;
  if (!knownPeerIds.includes(tid)) knownPeerIds.push(tid);
  const conn = peer.connect(tid, { reliable: true });
  conn.on('open', () => {
    connections[tid] = conn;
    conn.send({ type: 'hello', player: getMyState() });
    updateOnlineCount();
    if (micEnabled) setTimeout(() => callPeer(tid), 500);
  });
  conn.on('data', data => handleData(tid, data));
  conn.on('close', () => handleDisconnect(tid));
}

function getMyState() {
  return { x: myPlayer.x, y: myPlayer.y, dir: myPlayer.dir, frame: myPlayer.frame,
    walking: myPlayer.walking, color: myPlayer.color, name: nameInput.value||'Player',
    hp: myPlayer.hp, ghostUntil: myPlayer.ghostUntil, avatar: myAvatarDataUrl, carId: myPlayer.carId, equips: myPlayer.equips };
}

function getRemotePlayerStates() {
  const out = {};
  for (const [pid, p] of Object.entries(remotePlayers))
    out[pid] = { x:p.x, y:p.y, dir:p.dir, color:p.color, name:p.name, walking:p.walking, hp:p.hp, ghostUntil:p.ghostUntil, avatar:p.avatar };
  return out;
}

function broadcast(data, ex) {
  for (const [id, conn] of Object.entries(connections))
    if (id !== ex && conn.open) conn.send(data);
}

function updateOnlineCount() {
  document.getElementById('online-count').textContent = `${Object.keys(connections).length+1} online`;
}

function notify(text) {
  const el = document.createElement('div');
  el.className = 'notif'; el.textContent = text;
  document.getElementById('notifications').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function updatePlayerList() {
  const c = document.getElementById('pl-entries');
  const hb = hp => '❤️'.repeat(hp) + '🖤'.repeat(MAX_HP - hp);
  let html = `<div class="pl-entry"><span class="pl-dot" style="background:${myPlayer.color}"></span>${nameInput.value||'Player'} (you)${micEnabled?'🔊':''}<span class="pl-hp">${hb(myPlayer.hp)}</span></div>`;
  for (const rp of Object.values(remotePlayers))
    html += `<div class="pl-entry"><span class="pl-dot" style="background:${rp.color||'#888'}"></span>${rp.name||'Player'}${rp.voiceOn?'🔊':''}<span class="pl-hp">${hb(rp.hp??MAX_HP)}</span></div>`;
  c.innerHTML = html;
}

// ─── Emotes ───
function sendEmote(emoji) {
  myPlayer.emote = emoji;
  myPlayer.emoteTime = Date.now();
  broadcast({ type: 'emote', emote: emoji });
}

// ─── Attack ───
let lastAttackTime = 0, damageFlashUntil = 0;

function performAttack() {
  const now = Date.now();
  if (now - lastAttackTime < ATTACK_COOLDOWN || isGhost(myPlayer)) return;

  // if driving, exit the car
  if (myPlayer.carId >= 0) {
    exitCar();
    lastAttackTime = now;
    return;
  }

  // check if near whiteboard to write
  if (isNearWhiteboard(myPlayer.x, myPlayer.y)) {
    lastAttackTime = now;
    openWhiteboardInput();
    return;
  }

  // check if near chest reset switch
  if (isNearSwitch(myPlayer.x, myPlayer.y)) {
    lastAttackTime = now;
    resetAllChests();
    return;
  }

  // check if near a chest to open
  for (const chest of chests) {
    if (chest.opened) continue;
    const dx = myPlayer.x - chest.x, dy = myPlayer.y - chest.y;
    if (Math.sqrt(dx*dx + dy*dy) < CHEST_RANGE) {
      openChest(chest);
      lastAttackTime = now;
      return;
    }
  }

  // check if near a car to enter
  for (const car of cars) {
    if (car.driverPid) continue;
    const cdx = myPlayer.x - car.x, cdy = myPlayer.y - car.y;
    if (Math.sqrt(cdx*cdx + cdy*cdy) < CAR_INTERACT_RANGE) {
      enterCar(car);
      lastAttackTime = now;
      return;
    }
  }

  // normal attack
  lastAttackTime = now;
  myPlayer.attackTime = now;
  const ax = myPlayer.x, ay = myPlayer.y, dir = myPlayer.dir;
  addAttackEffect(ax, ay, dir);
  broadcast({ type: 'attack', x: ax, y: ay, dir });
  const hb = getAttackBox(ax, ay, dir);
  for (const [pid, rp] of Object.entries(remotePlayers)) {
    if (isGhost(rp)) continue;
    if (rp.x > hb.x1 && rp.x < hb.x2 && rp.y > hb.y1 && rp.y < hb.y2)
      if (connections[pid]?.open) connections[pid].send({ type: 'hit' });
  }
}

function enterCar(car) {
  myPlayer.carId = car.id;
  car.driverPid = 'me';
  myPlayer.x = car.x; myPlayer.y = car.y;
  car.dir = myPlayer.dir;
  broadcast({ type: 'car_enter', carId: car.id });
  notify('🚗 Driving! Space to exit');
}

function exitCar() {
  const car = cars[myPlayer.carId];
  if (!car) return;
  car.driverPid = null;
  // place player next to car
  const offsets = [[0,30],[0,-30],[30,0],[-30,0]];
  for (const [ox, oy] of offsets) {
    if (canMove(car.x + ox, car.y + oy)) { myPlayer.x = car.x + ox; myPlayer.y = car.y + oy; break; }
  }
  broadcast({ type: 'car_exit', carId: myPlayer.carId, carX: car.x, carY: car.y, carDir: car.dir });
  myPlayer.carId = -1;
  notify('Exited car');
}

function openChest(chest) {
  chest.opened = true;
  const eq = EQUIP_LIST.find(e => e.id === chest.equipId);
  if (eq) {
    myPlayer.equips = myPlayer.equips.filter(eid => EQUIP_LIST.find(d=>d.id===eid)?.slot !== eq.slot);
    myPlayer.equips.push(eq.id);
    notify('🎁 Got ' + eq.name + '!');
    addChestEffect(chest.x, chest.y);
  }
  broadcast({ type: 'chest_open', chestId: chest.id, equipId: chest.equipId });
  broadcast({ type: 'equip_sync', equips: myPlayer.equips });
}

const chestEffects = [];
function addChestEffect(x, y) {
  chestEffects.push({ x, y, time: Date.now() });
}

function openWhiteboardInput() {
  openWhiteboardModal();
}

function getAttackBox(x, y, dir) {
  const r = ATTACK_RANGE, w = ATTACK_WIDTH;
  if (dir===0) return {x1:x-w,y1:y+5,x2:x+w,y2:y+5+r};
  if (dir===1) return {x1:x-5-r,y1:y-w,x2:x-5,y2:y+w};
  if (dir===2) return {x1:x+5,y1:y-w,x2:x+5+r,y2:y+w};
  return {x1:x-w,y1:y-5-r,x2:x+w,y2:y-5};
}
function addAttackEffect(x,y,dir) { attackEffects.push({x,y,dir,time:Date.now(),type:'punch'}); }
function addDamageFlash() { damageFlashUntil = Date.now() + 200; }
function isGhost(p) { return p.ghostUntil && Date.now() < p.ghostUntil; }

const chatImageCache = {};
function loadChatImage(dataUrl) {
  if (chatImageCache[dataUrl]) return chatImageCache[dataUrl];
  const img = new Image();
  img.src = dataUrl;
  chatImageCache[dataUrl] = img;
  return img;
}

chatInput.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const maxW = 160, maxH = 100;
          let w = img.width, h = img.height;
          if (w > maxW) { h = h * maxW / w; w = maxW; }
          if (h > maxH) { w = w * maxH / h; h = maxH; }
          const c = document.createElement('canvas');
          c.width = Math.round(w); c.height = Math.round(h);
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          const dataUrl = c.toDataURL('image/jpeg', 0.45);
          myPlayer.chatImage = dataUrl;
          myPlayer.chatImageTime = Date.now();
          broadcast({ type:'chatImage', image: dataUrl });
          chatInput.value = ''; chatInput.blur(); chatInput.classList.remove('visible');
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
});

document.addEventListener('keydown', e => {

});

// ─── Mobile Touch Controls ───
(function initMobileControls() {
  const dirMap = { up: 'arrowup', down: 'arrowdown', left: 'arrowleft', right: 'arrowright' };
  const dpadBtns = document.querySelectorAll('.dpad-btn');
  const activeTouches = {};

  dpadBtns.forEach(btn => {
    const dir = btn.dataset.dir;
    const keyName = dirMap[dir];

    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      for (const t of e.changedTouches) activeTouches[t.identifier] = { btn, keyName };
      keys[keyName] = true;
      btn.classList.add('pressed');
    }, { passive: false });

    btn.addEventListener('touchend', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (activeTouches[t.identifier]?.keyName === keyName) delete activeTouches[t.identifier];
      }
      const stillHeld = Object.values(activeTouches).some(v => v.keyName === keyName);
      if (!stillHeld) { keys[keyName] = false; btn.classList.remove('pressed'); }
    }, { passive: false });

    btn.addEventListener('touchcancel', e => {
      for (const t of e.changedTouches) delete activeTouches[t.identifier];
      keys[keyName] = false;
      btn.classList.remove('pressed');
    });

    btn.addEventListener('mousedown', e => { e.preventDefault(); keys[keyName] = true; btn.classList.add('pressed'); });
    btn.addEventListener('mouseup', () => { keys[keyName] = false; btn.classList.remove('pressed'); });
    btn.addEventListener('mouseleave', () => { keys[keyName] = false; btn.classList.remove('pressed'); });
  });

  const atkBtn = document.getElementById('mobile-atk');
  atkBtn.addEventListener('touchstart', e => { e.preventDefault(); performAttack(); atkBtn.classList.add('pressed'); }, { passive: false });
  atkBtn.addEventListener('touchend', e => { e.preventDefault(); atkBtn.classList.remove('pressed'); }, { passive: false });
  atkBtn.addEventListener('click', e => { e.preventDefault(); performAttack(); });

  const chatBtn = document.getElementById('mobile-chat');
  chatBtn.addEventListener('touchstart', e => { e.preventDefault(); chatBtn.classList.add('pressed'); }, { passive: false });
  chatBtn.addEventListener('touchend', e => {
    e.preventDefault(); chatBtn.classList.remove('pressed');
    chatInput.classList.add('visible'); chatInput.focus();
  }, { passive: false });
  chatBtn.addEventListener('click', e => {
    e.preventDefault(); chatInput.classList.add('visible'); chatInput.focus();
  });

  document.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      const info = activeTouches[t.identifier];
      if (!info) continue;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (el !== info.btn && !info.btn.contains(el)) {
        keys[info.keyName] = false;
        info.btn.classList.remove('pressed');
        const newBtn = el?.closest?.('.dpad-btn');
        if (newBtn && newBtn.dataset.dir) {
          const newKey = dirMap[newBtn.dataset.dir];
          keys[newKey] = true;
          newBtn.classList.add('pressed');
          activeTouches[t.identifier] = { btn: newBtn, keyName: newKey };
        } else {
          delete activeTouches[t.identifier];
        }
      }
    }
  }, { passive: false });
})();

// ─── Collision ───
function canMove(x, y) {
  const pad = 10;
  for (const [cx, cy] of [[x-pad,y-pad],[x+pad,y-pad],[x-pad,y+pad],[x+pad,y+pad]]) {
    const col = Math.floor(cx/TILE), row = Math.floor(cy/TILE);
    if (row<0||row>=MAP_ROWS||col<0||col>=MAP_COLS) return false;
    if (!WALKABLE.has(MAP[row]?.[col])) return false;
  }
  return true;
}

// ─── Update ───
let lastBroadcast = 0;
function update() {
  if (!gameStarted) return;
  if (chatFocused) { myPlayer.walking = false; return; }
  const driving = myPlayer.carId >= 0;
  const spd = driving ? CAR_SPEED : SPEED;
  let dx = 0, dy = 0;
  if (keys['arrowup'] || keys['w']) dy = -spd;
  if (keys['arrowdown'] || keys['s']) dy = spd;
  if (keys['arrowleft'] || keys['a']) dx = -spd;
  if (keys['arrowright'] || keys['d']) dx = spd;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  myPlayer.walking = !!(dx || dy);
  if (dx || dy) {
    if (canMove(myPlayer.x+dx, myPlayer.y)) myPlayer.x += dx;
    if (canMove(myPlayer.x, myPlayer.y+dy)) myPlayer.y += dy;
    if (Math.abs(dx) > Math.abs(dy)) myPlayer.dir = dx<0?1:2;
    else myPlayer.dir = dy<0?3:0;
    animTick++;
    if (animTick%6===0) myPlayer.frame = (myPlayer.frame+1)%4;
    // sync car position
    if (driving && cars[myPlayer.carId]) {
      const car = cars[myPlayer.carId];
      car.x = myPlayer.x; car.y = myPlayer.y; car.dir = myPlayer.dir;
    }
    const now = Date.now();
    if (now-lastBroadcast > 33) {
      broadcast({type:'move',player:getMyState()});
      if (driving) broadcast({type:'car_move', carId: myPlayer.carId, x: myPlayer.x, y: myPlayer.y, dir: myPlayer.dir});
      lastBroadcast = now;
    }
  }
  for (const p of Object.values(remotePlayers)) {
    if (p.targetX !== undefined) {
      const ddx = p.targetX-p.x, ddy = p.targetY-p.y;
      if (Math.sqrt(ddx*ddx+ddy*ddy)>1) {
        p.x += ddx*0.2; p.y += ddy*0.2; p.walking = true;
        p._at = (p._at||0)+1; if (p._at%6===0) p.frame=((p.frame||0)+1)%4;
      } else { p.x = p.targetX; p.y = p.targetY; p.walking = false; }
    }
  }
  const now = Date.now();
  while (attackEffects.length && now-attackEffects[0].time>350) attackEffects.shift();

}

// ─── Drawing ───
const tileDetail = [];
for (let r = 0; r < MAP_ROWS; r++) {
  tileDetail[r] = [];
  for (let c = 0; c < MAP_COLS; c++) tileDetail[r][c] = Math.random();
}

function drawTile(col, row) {
  const x = col*TILE, y = row*TILE;
  const t = MAP[row]?.[col] ?? 0;
  const det = tileDetail[row]?.[col] ?? 0;
  const now = Date.now();

  switch (t) {
    case T.FLOOR: {
      const base = (col+row)%2===0 ? '#e8e0d4' : '#e2dace';
      ctx.fillStyle = base; ctx.fillRect(x,y,TILE,TILE);
      ctx.strokeStyle='#d5cdc0'; ctx.lineWidth=0.5; ctx.strokeRect(x+.5,y+.5,TILE-1,TILE-1);
      if (det > 0.9) { ctx.fillStyle='rgba(0,0,0,0.02)'; ctx.fillRect(x+8+det*10,y+12,6,3); }
      break;
    }
    case T.WALL:
      ctx.fillStyle = '#6c7a7b'; ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#7f8c8d'; ctx.fillRect(x+1,y+1,TILE-2,TILE-2);
      // brick pattern
      ctx.fillStyle = '#8a9899';
      if (row%2===0) {
        ctx.fillRect(x+1,y+2,14,12); ctx.fillRect(x+17,y+2,14,12);
        ctx.fillRect(x+8,y+16,14,12);
      } else {
        ctx.fillRect(x+8,y+2,14,12);
        ctx.fillRect(x+1,y+16,14,12); ctx.fillRect(x+17,y+16,14,12);
      }
      // mortar
      ctx.fillStyle = '#6c7a7b';
      ctx.fillRect(x,y+14,TILE,2); ctx.fillRect(x+15,y,2,TILE);
      // top highlight
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(x+2,y+2,TILE-4,2);
      break;
    case T.DESK: {
      const base = (col+row)%2===0 ? '#e8e0d4' : '#e2dace';
      ctx.fillStyle = base; ctx.fillRect(x,y,TILE,TILE);
      // desk surface
      ctx.fillStyle = '#b08050'; ctx.fillRect(x+1,y+4,TILE-2,TILE-6);
      ctx.fillStyle = '#c49a6a'; ctx.fillRect(x+2,y+5,TILE-4,TILE-8);
      // wood grain
      ctx.fillStyle = 'rgba(160,112,64,0.3)';
      ctx.fillRect(x+4,y+8,TILE-8,1); ctx.fillRect(x+3,y+14,TILE-6,1);
      ctx.fillRect(x+5,y+20,TILE-10,1);
      // legs
      ctx.fillStyle = '#8a6838';
      ctx.fillRect(x+2,y+TILE-4,4,4); ctx.fillRect(x+TILE-6,y+TILE-4,4,4);
      // drawer handle
      ctx.fillStyle = '#d4a86a';
      ctx.fillRect(x+12,y+16,8,2);
      break;
    }
    case T.MONITOR: {
      const base = (col+row)%2===0 ? '#e8e0d4' : '#e2dace';
      ctx.fillStyle = base; ctx.fillRect(x,y,TILE,TILE);
      // desk under monitor
      ctx.fillStyle = '#b08050'; ctx.fillRect(x+1,y+20,TILE-2,TILE-22);
      ctx.fillStyle = '#c49a6a'; ctx.fillRect(x+2,y+21,TILE-4,TILE-24);
      // monitor stand
      ctx.fillStyle = '#444'; ctx.fillRect(x+13,y+16,6,5);
      ctx.fillStyle = '#555'; ctx.fillRect(x+10,y+20,12,3);
      // monitor frame
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+4,y+1,TILE-8,17);
      // screen with glow
      const flicker = Math.sin(now/1000+col*3+row)*0.08+0.92;
      ctx.globalAlpha = flicker;
      ctx.fillStyle = '#3498db'; ctx.fillRect(x+6,y+3,TILE-12,13);
      // screen content (text lines)
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(x+8,y+5,12,1); ctx.fillRect(x+8,y+8,8,1);
      ctx.fillRect(x+8,y+11,10,1);
      ctx.globalAlpha = 1;
      // bezel highlight
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fillRect(x+5,y+2,TILE-10,1);
      // keyboard
      ctx.fillStyle = '#34495e'; ctx.fillRect(x+6,y+24,TILE-12,4);
      ctx.fillStyle = '#4a6274';
      for (let i=0;i<4;i++) ctx.fillRect(x+8+i*4,y+25,3,2);
      break;
    }
    case T.CARPET:
      ctx.fillStyle = (col+row)%2===0 ? '#5b7fa5' : '#5479a0';
      ctx.fillRect(x,y,TILE,TILE);
      // subtle pattern
      if (det > 0.7) {
        ctx.fillStyle='rgba(255,255,255,0.04)';
        ctx.fillRect(x+4,y+4,8,8);
        ctx.fillRect(x+20,y+20,8,8);
      }
      // carpet texture
      ctx.fillStyle='rgba(0,0,0,0.03)';
      if ((col+row)%3===0) ctx.fillRect(x+2,y+6,4,2);
      break;
    case T.CORRIDOR:
      ctx.fillStyle = (col+row)%2===0 ? '#d4cec2' : '#cfc9bd';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.strokeStyle='#c5bfb3'; ctx.lineWidth=0.5; ctx.strokeRect(x+.5,y+.5,TILE-1,TILE-1);
      break;
    case T.DOOR: {
      const base = (col+row)%2===0 ? '#d4cec2' : '#cfc9bd';
      ctx.fillStyle = base; ctx.fillRect(x,y,TILE,TILE);
      // door frame
      ctx.fillStyle = '#7f6a52'; ctx.fillRect(x+4,y,TILE-8,TILE);
      // door panel
      ctx.fillStyle = '#a0724a'; ctx.fillRect(x+6,y+1,TILE-12,TILE-2);
      ctx.fillStyle = '#b88458'; ctx.fillRect(x+8,y+3,TILE-16,TILE-6);
      // door panels (upper + lower)
      ctx.fillStyle = '#a07848';
      ctx.fillRect(x+9,y+4,TILE-18,10); ctx.fillRect(x+9,y+18,TILE-18,8);
      ctx.fillStyle = '#c49868';
      ctx.fillRect(x+10,y+5,TILE-20,8); ctx.fillRect(x+10,y+19,TILE-20,6);
      // door handle
      ctx.fillStyle = '#d4a86a'; ctx.fillRect(x+TILE-12,y+14,3,5);
      ctx.fillStyle = '#e6bd80'; ctx.fillRect(x+TILE-11,y+15,1,3);
      break;
    }
    case T.WINDOW: {
      ctx.fillStyle = '#6c7a7b'; ctx.fillRect(x,y,TILE,TILE);
      // window glass
      const sky = Math.sin(now/3000+col*0.5)*0.06+0.94;
      ctx.globalAlpha = sky;
      ctx.fillStyle = '#a8d8ea'; ctx.fillRect(x+3,y+3,TILE-6,TILE-6);
      // sky gradient effect
      ctx.fillStyle = '#87ceeb'; ctx.fillRect(x+4,y+4,TILE-8,8);
      ctx.fillStyle = '#b8e2f2'; ctx.fillRect(x+4,y+12,TILE-8,TILE-16);
      ctx.globalAlpha = 1;
      // window frame (cross)
      ctx.fillStyle = '#8a9a9b';
      ctx.fillRect(x+TILE/2-1,y+3,2,TILE-6);
      ctx.fillRect(x+3,y+TILE/2-1,TILE-6,2);
      // frame border
      ctx.fillStyle = '#5c6a6b';
      ctx.fillRect(x+2,y+2,TILE-4,1); ctx.fillRect(x+2,y+TILE-3,TILE-4,1);
      ctx.fillRect(x+2,y+2,1,TILE-4); ctx.fillRect(x+TILE-3,y+2,1,TILE-4);
      // reflection
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(x+5,y+5,4,6);
      break;
    }
    case T.PLANT: {
      const base = (col+row)%2===0 ? '#e8e0d4' : '#e2dace';
      ctx.fillStyle = base; ctx.fillRect(x,y,TILE,TILE);
      // pot
      ctx.fillStyle = '#a0522d'; ctx.fillRect(x+9,y+20,14,10);
      ctx.fillStyle = '#8B4513'; ctx.fillRect(x+8,y+19,16,3);
      ctx.fillStyle = '#cd853f'; ctx.fillRect(x+10,y+22,12,6);
      // soil
      ctx.fillStyle = '#4a3728'; ctx.fillRect(x+10,y+19,12,3);
      // trunk
      ctx.fillStyle = '#5d4e37'; ctx.fillRect(x+14,y+14,4,7);
      // leaves (layered circles)
      const sway = Math.sin(now/2000+col+row)*1.5;
      ctx.fillStyle = '#1e8449';
      ctx.beginPath(); ctx.arc(x+16+sway,y+12,9,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#27ae60';
      ctx.beginPath(); ctx.arc(x+13+sway*0.7,y+10,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2ecc71';
      ctx.beginPath(); ctx.arc(x+19+sway*0.5,y+9,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#58d68d';
      ctx.beginPath(); ctx.arc(x+15+sway*0.8,y+7,4,0,Math.PI*2); ctx.fill();
      // highlight
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.arc(x+14+sway,y+8,3,0,Math.PI*2); ctx.fill();
      break;
    }
    case T.PANTRY_FLOOR:
      ctx.fillStyle = (col+row)%2===0 ? '#f0e6d3' : '#ece2cf';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.strokeStyle = '#d8cebb'; ctx.lineWidth=0.5; ctx.strokeRect(x+.5,y+.5,TILE-1,TILE-1);
      // small tile pattern
      if ((col+row)%3===0) {
        ctx.fillStyle='rgba(0,0,0,0.03)';
        ctx.fillRect(x+2,y+2,TILE/2-2,TILE/2-2);
        ctx.fillRect(x+TILE/2,y+TILE/2,TILE/2-2,TILE/2-2);
      }
      break;
    case T.COUNTER:
      ctx.fillStyle = '#f0e6d3'; ctx.fillRect(x,y,TILE,TILE);
      // counter body
      ctx.fillStyle = '#7f8c8d'; ctx.fillRect(x+1,y+4,TILE-2,TILE-6);
      ctx.fillStyle = '#95a5a6'; ctx.fillRect(x+2,y+5,TILE-4,TILE-8);
      // countertop (marble)

function drawRoomLabels() {
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const rl of roomLabels) {
    const sx = rl.x - camX, sy = rl.y - camY;
    if (sx < -60 || sx > canvas.width+60 || sy < -30 || sy > canvas.height+30) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    const tw = ctx.measureText(rl.label).width;
    ctx.fillRect(rl.x - tw/2 - 4, rl.y - 9, tw + 8, 18);
    ctx.fillStyle = rl.type === 'meeting' ? '#5dade2' : rl.type === 'pantry' ? '#f39c12' : rl.type === 'whiteboard' ? '#f9e79f' : '#ecf0f1';
    ctx.fillText(rl.label, rl.x, rl.y + 1);
  }
}

function drawWhiteboardContent() {
  const near = isNearWhiteboard(myPlayer.x, myPlayer.y);
  const wbX = (wbArea.c + 1) * TILE + 4;
  const wbYmid = ((wbArea.r1 + wbArea.r2) / 2) * TILE;
  const wbW = 12 * TILE;
  const wbH = 11 * TILE;
  const wbY = wbYmid - wbH / 2;
  drawWhiteboardContent._bounds = near ? { x: wbX, y: wbY, w: wbW, h: wbH } : null;

  if (!near) return;

  ctx.fillStyle = 'rgba(236,240,241,0.97)';
  ctx.fillRect(wbX, wbY, wbW, wbH);
  ctx.strokeStyle = '#95a5a6'; ctx.lineWidth = 2;
  ctx.strokeRect(wbX, wbY, wbW, wbH);

  const headerH = 22;
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(wbX, wbY, wbW, headerH);
  ctx.fillStyle = '#ecf0f1';
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('📋 Whiteboard', wbX + 8, wbY + 15);
  ctx.font = '10px sans-serif'; ctx.textAlign = 'right'; ctx.fillStyle = '#bdc3c7';
  ctx.fillText('🔍 click to zoom', wbX + wbW - 8, wbY + 15);

  let curY = wbY + headerH + 6;
  const maxY = wbY + wbH - 6;
  const pad = 8;
  for (let i = 0; i < whiteboardEntries.length && curY < maxY; i++) {
    const entry = whiteboardEntries[i];
    if (entry.type === 'image') {
      const img = loadWbImage(entry.content);
      if (img.complete && img.naturalWidth) {
        let w = img.naturalWidth, h = img.naturalHeight;
        const fitW = wbW - pad * 2, fitH = 80;
        if (w > fitW) { h = h * fitW / w; w = fitW; }
        if (h > fitH) { w = w * fitH / h; h = fitH; }
        if (curY + h + 4 > maxY) break;
        if (entry.name) {
          ctx.font = '10px sans-serif'; ctx.fillStyle = '#7f8c8d';
          ctx.fillText(entry.name + ':', wbX + pad, curY + 10);
          curY += 14;
        }
        ctx.drawImage(img, wbX + pad, curY, Math.round(w), Math.round(h));
        curY += Math.round(h) + 6;
      }
    } else {
      ctx.font = '13px monospace'; ctx.fillStyle = '#2c3e50'; ctx.textAlign = 'left';
      ctx.fillText((entry.content || '').substring(0, 45), wbX + pad, curY + 12);
      curY += 18;
    }
  }

  if (whiteboardEntries.length === 0) {
    ctx.fillStyle = '#bdc3c7'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Nothing here yet — press SPACE to write', wbX + wbW/2, wbY + wbH/2);
  }

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Press SPACE to write / paste image', wbX + wbW/2, wbY + wbH + 16);
}

function openWhiteboardZoom() {
  const body = document.getElementById('wb-zoom-body');
  body.innerHTML = '';
  if (whiteboardEntries.length === 0) {
    body.innerHTML = '<p style="color:#999;text-align:center;padding:30px">Nothing here yet</p>';
  }
  for (const entry of whiteboardEntries) {
    const div = document.createElement('div');
    div.className = 'wb-zoom-entry ' + entry.type;
    if (entry.type === 'image') {
      if (entry.name) {
        const nm = document.createElement('div');
        nm.className = 'wb-zoom-name';
        nm.textContent = entry.name;
        div.appendChild(nm);
      }
      const img = document.createElement('img');
      img.src = entry.content;
      div.appendChild(img);
    } else {
      div.textContent = entry.content || '';
    }
    body.appendChild(div);
  }
  document.getElementById('wb-zoom').classList.add('open');
}

function closeWhiteboardZoom() {
  document.getElementById('wb-zoom').classList.remove('open');
}

function isMouseOverWhiteboard(e) {
  const bounds = drawWhiteboardContent._bounds;
  if (!bounds) return false;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const worldX = (e.clientX - rect.left) * scaleX / OBJ_SCALE + camX;
  const worldY = (e.clientY - rect.top) * scaleY / OBJ_SCALE + camY;
  return worldX >= bounds.x && worldX <= bounds.x + bounds.w &&
         worldY >= bounds.y && worldY <= bounds.y + bounds.h;
}

canvas.addEventListener('click', e => {
  if (!gameStarted) return;
  if (document.getElementById('wb-modal').classList.contains('open')) return;
  if (isMouseOverWhiteboard(e)) openWhiteboardZoom();
});

canvas.addEventListener('mousemove', e => {
  if (!gameStarted) return;
  canvas.style.cursor = isMouseOverWhiteboard(e) ? 'pointer' : 'default';
});

function drawCar(car) {
  const x = Math.round(car.x), y = Math.round(car.y);
  const c = car.color || '#e74c3c';
  const dir = car.dir;
  const dark = shadeColor(c, -25);
  const light = shadeColor(c, 20);
  ctx.save();
  ctx.translate(x, y);

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(0, 2, 22, 10, 0, 0, Math.PI*2); ctx.fill();

  if (dir === 1 || dir === 2) {
    if (dir === 1) ctx.scale(-1, 1);
    // body
    ctx.fillStyle = c;
    ctx.fillRect(-22, -11, 44, 22);

    ctx.fillRect(12, -9, 10, 18);

    ctx.fillRect(-10, -9, 22, 18);

    ctx.fillRect(10, -7, 4, 14);

    ctx.fillStyle = '#a8d8ea';
    ctx.fillRect(-12, -6, 3, 12);

    ctx.fillRect(-8, -9, 16, 3);
    ctx.fillRect(-8, 6, 16, 3);
    // door line
    ctx.strokeStyle = dark; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(-2,-11); ctx.lineTo(-2,11); ctx.stroke();

    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-17, -14, 9, 5); ctx.fillRect(-17, 9, 9, 5);
    ctx.fillRect(8, -14, 9, 5); ctx.fillRect(8, 9, 9, 5);
    ctx.fillStyle = '#555';
    ctx.fillRect(-15, -13, 5, 3); ctx.fillRect(-15, 10, 5, 3);
    ctx.fillRect(10, -13, 5, 3); ctx.fillRect(10, 10, 5, 3);
    // headlights
    ctx.fillStyle = '#ffeaa7';
    ctx.fillRect(20, -8, 3, 5); ctx.fillRect(20, 3, 3, 5);
    // tail lights
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(-22, -8, 2, 4); ctx.fillRect(-22, 4, 2, 4);
    // bumper
    ctx.fillStyle = '#7f8c8d';
    ctx.fillRect(-22, -4, 2, 8);
    ctx.fillRect(21, -4, 2, 8);
    // side mirror
    ctx.fillStyle = dark;
    ctx.fillRect(6, -14, 4, 3); ctx.fillRect(6, 11, 4, 3);
  } else {
    if (dir === 3) ctx.scale(1, -1);
    ctx.fillStyle = c;
    ctx.fillRect(-11, -22, 22, 44);
    ctx.fillStyle = light;
    ctx.fillRect(-9, 12, 18, 10);
    ctx.fillStyle = dark;
    ctx.fillRect(-9, -10, 18, 22);
    ctx.fillStyle = '#a8d8ea';
    ctx.fillRect(-7, 10, 14, 4);
    ctx.fillStyle = '#a8d8ea';
    ctx.fillRect(-6, -12, 12, 3);
    ctx.fillStyle = 'rgba(168,216,234,0.6)';
    ctx.fillRect(-11, -8, 3, 16); ctx.fillRect(8, -8, 3, 16);
    ctx.strokeStyle = dark; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(-11,-2); ctx.lineTo(11,-2); ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-14, -17, 5, 9); ctx.fillRect(9, -17, 5, 9);
    ctx.fillRect(-14, 8, 5, 9); ctx.fillRect(9, 8, 5, 9);
    ctx.fillStyle = '#555';
    ctx.fillRect(-13, -15, 3, 5); ctx.fillRect(10, -15, 3, 5);
    ctx.fillRect(-13, 10, 3, 5); ctx.fillRect(10, 10, 3, 5);
    ctx.fillStyle = '#ffeaa7';
