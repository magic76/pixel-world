function shadeColor(hex, percent) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, Math.max(0, r + Math.round(r * percent / 100)));
  g = Math.min(255, Math.max(0, g + Math.round(g * percent / 100)));
  b = Math.min(255, Math.max(0, b + Math.round(b * percent / 100)));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function drawChest(chest) {
  const x = Math.round(chest.x), y = Math.round(chest.y);
  const t = Date.now() * 0.003;
  ctx.save();
  ctx.translate(x, y);

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(0, 12, 14, 4, 0, 0, Math.PI*2); ctx.fill();

  if (chest.opened) {
    // base
    ctx.fillStyle = '#5D4037'; ctx.fillRect(-13, -2, 26, 14);
    ctx.fillStyle = '#4E342E'; ctx.fillRect(-11, 0, 22, 10);
    // inside glow
    ctx.fillStyle = '#795548'; ctx.fillRect(-11, -2, 22, 5);
    ctx.fillStyle = 'rgba(241,196,15,0.2)'; ctx.fillRect(-10, -1, 20, 4);
    // lid (open, tilted back)
    ctx.fillStyle = '#6D4C41'; ctx.fillRect(-14, -14, 28, 12);
    ctx.fillStyle = '#8D6E63'; ctx.fillRect(-12, -12, 24, 8);
    ctx.fillStyle = '#3E2723'; ctx.fillRect(-14, -14, 28, 2);
    // gold band on lid
    ctx.fillStyle = '#c9a830'; ctx.fillRect(-13, -8, 26, 2);
    // hinge
    ctx.fillStyle = '#8D6E63';
    ctx.fillRect(-10, -3, 4, 3); ctx.fillRect(6, -3, 4, 3);
    // empty inside
    ctx.fillStyle = '#3E2723'; ctx.fillRect(-9, 0, 18, 3);
  } else {
    // body
    ctx.fillStyle = '#8D6E63'; ctx.fillRect(-13, -8, 26, 20);
    // inner panel
    ctx.fillStyle = '#795548'; ctx.fillRect(-11, -6, 22, 16);
    // lid
    ctx.fillStyle = '#6D4C41'; ctx.fillRect(-13, -8, 26, 6);
    ctx.fillStyle = '#8D6E63'; ctx.fillRect(-11, -6, 22, 3);
    // gold bands
    ctx.fillStyle = '#f1c40f';
    ctx.fillRect(-14, -3, 28, 2);
    ctx.fillRect(-14, 6, 28, 2);
    // corner rivets
    ctx.fillStyle = '#e6a817';
    ctx.fillRect(-12, -6, 2, 2); ctx.fillRect(10, -6, 2, 2);
    ctx.fillRect(-12, 8, 2, 2); ctx.fillRect(10, 8, 2, 2);
    // lock plate
    ctx.fillStyle = '#d4ac0d'; ctx.fillRect(-4, -1, 8, 7);
    ctx.fillStyle = '#f1c40f'; ctx.fillRect(-3, 0, 6, 5);
    // keyhole
    ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(0, 2, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(-1, 2, 2, 3);
    // sparkles
    ctx.globalAlpha = 0.5 + 0.4 * Math.sin(t + chest.id);
    ctx.fillStyle = '#fef9c3';
    const s1x = -11 + Math.sin(t*1.3+chest.id)*4, s1y = -12;
    ctx.fillRect(s1x, s1y, 3, 1); ctx.fillRect(s1x+1, s1y-1, 1, 3);
    const s2x = 8 + Math.cos(t*1.7+chest.id)*4, s2y = -11;
    ctx.fillRect(s2x, s2y, 3, 1); ctx.fillRect(s2x+1, s2y-1, 1, 3);
    ctx.globalAlpha = 0.3 + 0.3 * Math.sin(t*2 + chest.id + 2);
    const s3x = Math.sin(t*0.9+chest.id+1)*6, s3y = -14;
    ctx.fillRect(s3x, s3y, 2, 1); ctx.fillRect(s3x+0.5, s3y-0.5, 1, 2);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawChestEffects() {
  const now = Date.now();
  for (let i = chestEffects.length - 1; i >= 0; i--) {
    const ef = chestEffects[i];
    const elapsed = now - ef.time;
    if (elapsed > 1000) { chestEffects.splice(i, 1); continue; }
    const prog = elapsed / 1000;
    ctx.save();
    ctx.globalAlpha = 1 - prog;
    ctx.font = `${20 + prog * 16}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('🎁', ef.x, ef.y - 20 - prog * 30);
    ctx.restore();
  }
}

function drawEquipment(x, y, dir, equips, frame) {
  if (!equips || equips.length === 0) return;
  const now = Date.now();
  for (const eid of equips) {
    const eq = EQUIP_LIST.find(e => e.id === eid);
    if (!eq) continue;
    ctx.save();
    ctx.translate(x, y);
    switch (eq.id) {
      case 'crown':
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(-7, -24, 14, 5);
        ctx.fillRect(-9, -27, 4, 4); ctx.fillRect(-1, -29, 3, 6); ctx.fillRect(5, -27, 4, 4);
        break;
      case 'helmet':
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(-8, -24, 16, 8);
        ctx.fillStyle = '#95a5a6';
        ctx.fillRect(-6, -26, 12, 4);
        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(-2, -17, 4, 3);
        break;
      case 'halo':
        ctx.strokeStyle = '#f9e79f';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, -26, 10, 3, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(249,231,159,0.3)';
        ctx.beginPath();
        ctx.ellipse(0, -26, 12, 4, 0, 0, Math.PI * 2);
        ctx.stroke();
        break;
      case 'horns':
        ctx.fillStyle = '#c0392b';
        ctx.beginPath(); ctx.moveTo(-8, -20); ctx.lineTo(-12, -30); ctx.lineTo(-4, -22); ctx.fill();
        ctx.beginPath(); ctx.moveTo(8, -20); ctx.lineTo(12, -30); ctx.lineTo(4, -22); ctx.fill();
        break;
      case 'cape': {
        const swing = Math.sin(now * 0.004) * 3;
        ctx.fillStyle = eq.color;
        ctx.beginPath();
        ctx.moveTo(-6, -8); ctx.lineTo(-8 + swing, 12); ctx.lineTo(8 + swing, 12); ctx.lineTo(6, -8);
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.moveTo(-4, -4); ctx.lineTo(-6 + swing, 12); ctx.lineTo(6 + swing, 12); ctx.lineTo(4, -4);
        ctx.fill();
        break;
      }
      case 'armor':
        ctx.fillStyle = '#5dade2';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(-8, -10, 16, 14);
        ctx.fillStyle = '#85c1e9';
        ctx.fillRect(-6, -8, 12, 3);
        ctx.globalAlpha = 1;
        break;
      case 'tux':
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(-7, -8, 14, 12);
        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(-2, -8, 4, 10);
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(-1, -7, 2, 2);
        break;
      case 'wings': {
        const flap = Math.sin(now * 0.006) * 4;
        ctx.fillStyle = 'rgba(174,214,241,0.6)';
        ctx.beginPath();
        ctx.moveTo(-6, -6); ctx.lineTo(-18 - flap, -14); ctx.lineTo(-16 - flap, 2); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(6, -6); ctx.lineTo(18 + flap, -14); ctx.lineTo(16 + flap, 2); ctx.fill();
        break;
      }
      case 'jetpack':
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(-10, -8, 5, 12); ctx.fillRect(5, -8, 5, 12);
        ctx.fillStyle = '#e67e22';
        const flame = 4 + Math.sin(now * 0.02) * 3;
        ctx.fillRect(-9, 4, 3, flame); ctx.fillRect(6, 4, 3, flame);
        break;
      case 'scarf': {
        const sw = Math.sin(now * 0.005) * 4;
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(-7, -12, 14, 4);
        ctx.beginPath();
        ctx.moveTo(6, -10); ctx.lineTo(10 + sw, 0); ctx.lineTo(6 + sw, 2); ctx.lineTo(4, -8);
        ctx.fill();
        break;
      }
      case 'glasses':
        ctx.fillStyle = '#222';
        ctx.fillRect(-7, -18, 6, 4); ctx.fillRect(1, -18, 6, 4);
        ctx.fillRect(-1, -17, 2, 2);
        ctx.fillStyle = 'rgba(50,50,50,0.5)';
        ctx.fillRect(-6, -17, 4, 2); ctx.fillRect(2, -17, 4, 2);
        break;
      case 'mask':
        ctx.fillStyle = '#8e44ad';
        ctx.globalAlpha = 0.7;
        ctx.fillRect(-7, -20, 14, 7);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(-5, -19, 3, 3); ctx.fillRect(2, -19, 3, 3);
        break;
      case 'sword': {
        const angle = dir === 0 ? 0.3 : dir === 3 ? -0.3 : dir === 1 ? -0.8 : 0.8;
        ctx.save();
        ctx.rotate(angle);
        ctx.fillStyle = '#bdc3c7'; ctx.fillRect(7, -14, 3, 16);
        ctx.fillStyle = '#f1c40f'; ctx.fillRect(5, 0, 7, 3);
        ctx.fillStyle = '#8B4513'; ctx.fillRect(7, 3, 3, 5);
        ctx.restore();
        break;
      }
      case 'shield': {
        const sx = dir === 1 ? -12 : dir === 2 ? 8 : -12;
        ctx.fillStyle = '#2980b9';
        ctx.beginPath();
        ctx.moveTo(sx, -8); ctx.lineTo(sx + 10, -8); ctx.lineTo(sx + 10, 2);
        ctx.lineTo(sx + 5, 6); ctx.lineTo(sx, 2); ctx.fill();
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(sx + 3, -5, 4, 4);
        break;
      }
      case 'wand': {
        const angle = dir === 0 ? 0.5 : dir === 3 ? -0.5 : dir === 1 ? -1 : 1;
        ctx.save(); ctx.rotate(angle);
        ctx.fillStyle = '#8B4513'; ctx.fillRect(8, -2, 14, 3);
        ctx.fillStyle = '#f9e79f';
        const sparkle = Math.sin(now * 0.01) * 2;
        ctx.fillRect(20 + sparkle, -5, 4, 4);
        ctx.fillRect(22, -3 + sparkle, 4, 4);
        ctx.restore();
        break;
      }
      case 'boots':
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(-7, 6, 5, 5); ctx.fillRect(2, 6, 5, 5);
        ctx.fillRect(-8, 9, 6, 3); ctx.fillRect(1, 9, 6, 3);
        break;
      case 'sneakers':
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(-7, 6, 5, 4); ctx.fillRect(2, 6, 5, 4);
        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(-7, 9, 6, 2); ctx.fillRect(2, 9, 6, 2);
        break;
      case 'aura_fire': {
        ctx.globalAlpha = 0.25 + 0.1 * Math.sin(now * 0.008);
        const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 22);
        grad.addColorStop(0, 'rgba(231,76,60,0.6)');
        grad.addColorStop(0.5, 'rgba(243,156,18,0.3)');
        grad.addColorStop(1, 'rgba(231,76,60,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        break;
      }
      case 'aura_ice': {
        ctx.globalAlpha = 0.2 + 0.1 * Math.sin(now * 0.006);
        const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 22);
        grad.addColorStop(0, 'rgba(93,173,226,0.5)');
        grad.addColorStop(0.5, 'rgba(174,214,241,0.2)');
        grad.addColorStop(1, 'rgba(93,173,226,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        break;
      }
      case 'aura_gold': {
        ctx.globalAlpha = 0.2 + 0.15 * Math.sin(now * 0.005);
        const grad = ctx.createRadialGradient(0, 0, 4, 0, 0, 24);
        grad.addColorStop(0, 'rgba(241,196,15,0.6)');
        grad.addColorStop(0.5, 'rgba(249,231,159,0.3)');
        grad.addColorStop(1, 'rgba(241,196,15,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        for (let i = 0; i < 5; i++) {
          const a = now * 0.002 + i * 1.256;
          const r = 16 + Math.sin(now*0.003+i)*4;
          ctx.fillStyle = 'rgba(249,231,159,0.7)';
          ctx.fillRect(Math.cos(a)*r - 1, Math.sin(a)*r - 1, 2, 2);
        }
        break;
      }
    }
    ctx.restore();
  }
}

function drawHpBar(x, y, hp) {
  const tw = 34, h = 5, gap = 1;
  const bw = (tw - gap*(MAX_HP-1)) / MAX_HP;
  const sx = x - tw/2;
  // bg
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  const r=3, bx=sx-2, by=y-2, bwt=tw+4, bht=h+4;
  ctx.moveTo(bx+r,by); ctx.lineTo(bx+bwt-r,by);
  ctx.quadraticCurveTo(bx+bwt,by,bx+bwt,by+r); ctx.lineTo(bx+bwt,by+bht-r);
  ctx.quadraticCurveTo(bx+bwt,by+bht,bx+bwt-r,by+bht); ctx.lineTo(bx+r,by+bht);
  ctx.quadraticCurveTo(bx,by+bht,bx,by+bht-r); ctx.lineTo(bx,by+r);
  ctx.quadraticCurveTo(bx,by,bx+r,by); ctx.fill();
  for (let i = 0; i < MAX_HP; i++) {
    const color = i < hp ? (hp>2?'#53d769':hp>1?'#f0ad4e':'#e94560') : '#222';
    ctx.fillStyle = color;
    ctx.fillRect(sx + i*(bw+gap), y, bw, h);
    if (i < hp) {
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(sx + i*(bw+gap), y, bw, 2);
    }
  }
}

const OBJ_SCALE = 1.5;
function drawCharacter(p, isMe) {
  const x = Math.round(p.x), y = Math.round(p.y);
  const color = p.color||'#e94560', name = p.name||'Player';
  const frame = p.frame||0, walking = p.walking, ghost = isGhost(p);
  const inCar = (p.carId ?? -1) >= 0;
  const now = Date.now();

  if (inCar) {
    drawHpBar(x, y-30, p.hp??MAX_HP);
    ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    const tw2 = ctx.measureText(name).width;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    const nbx=x-tw2/2-5, nby=y-46, nbw=tw2+10, nbh=16, nr=4;
    ctx.moveTo(nbx+nr,nby); ctx.lineTo(nbx+nbw-nr,nby);
    ctx.quadraticCurveTo(nbx+nbw,nby,nbx+nbw,nby+nr); ctx.lineTo(nbx+nbw,nby+nbh-nr);
    ctx.quadraticCurveTo(nbx+nbw,nby+nbh,nbx+nbw-nr,nby+nbh); ctx.lineTo(nbx+nr,nby+nbh);
    ctx.quadraticCurveTo(nbx,nby+nbh,nbx,nby+nbh-nr); ctx.lineTo(nbx,nby+nr);
    ctx.quadraticCurveTo(nbx,nby,nbx+nr,nby); ctx.fill();
    ctx.fillStyle = isMe ? '#f0ad4e' : '#fff'; ctx.fillText(name, x, y-33);
    if (p.emote && now-p.emoteTime < EMOTE_DURATION) {
      const et = (now-p.emoteTime)/EMOTE_DURATION;
      ctx.save(); ctx.globalAlpha = et<0.1?et/0.1:et>0.7?(1-et)/0.3:1;
      ctx.font = `${Math.round(28*(et<0.15?0.5+et/0.15*0.5:1))}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.emote, x, y-60-et*20); ctx.restore();
    }
    if (p.chatImage && now-p.chatImageTime < IMG_CHAT_DURATION) {
      drawImageBubble(x, y-50, p.chatImage, Math.min(1, (1-(now-p.chatImageTime)/IMG_CHAT_DURATION)*3));
    } else if (p.chat && now-p.chatTime < CHAT_DURATION) {
      drawChatBubble(x, y-50, p.chat, Math.min(1,(1-(now-p.chatTime)/CHAT_DURATION)*3));
    }
    return;
  }

  ctx.save();
  if (ghost) ctx.globalAlpha = Math.sin(now/100)*0.15+0.3;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(x, y+16, 11, 5, 0, 0, Math.PI*2); ctx.fill();

  const punching = p.attackTime && (now - p.attackTime) < 250;
  const pt = punching ? (now - p.attackTime) / 250 : 0;
  const extend = punching ? (pt < 0.4 ? pt/0.4 : 1-(pt-0.4)/0.6) : 0;
  const reach = extend * 16;

  // legs with shoes
  const darkColor = shadeColor(color, -25);
  ctx.fillStyle = '#34495e';
  if (walking) {
    const ls = Math.sin(frame*Math.PI/2)*5;
    ctx.fillRect(x-6, y+6+ls, 5, 9); ctx.fillRect(x+1, y+6-ls, 5, 9);
    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(x-7, y+13+ls, 7, 4); ctx.fillRect(x, y+13-ls, 7, 4);
  } else {
    ctx.fillRect(x-6, y+6, 5, 9); ctx.fillRect(x+1, y+6, 5, 9);
    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(x-7, y+13, 7, 4); ctx.fillRect(x, y+13, 7, 4);
  }

  // torso
  ctx.fillStyle = color;
  ctx.fillRect(x-8, y-12, 16, 20);
  ctx.fillStyle = darkColor;
  ctx.fillRect(x-8, y-12, 16, 3);
  // collar / shirt detail
  ctx.fillStyle = shadeColor(color, 15);
  ctx.fillRect(x-3, y-12, 6, 5);

  // belt
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(x-8, y+5, 16, 3);
  ctx.fillStyle = '#f1c40f';
  ctx.fillRect(x-2, y+5, 4, 3);

  // arms with hands
  const skinColor = '#f5cba7';
  if (punching) {
    if (p.dir === 2) {
      ctx.fillStyle = color; ctx.fillRect(x-11, y-9, 4, 15);
      ctx.fillStyle = skinColor; ctx.fillRect(x-11, y+4, 4, 4);
      ctx.fillStyle = color; ctx.fillRect(x+7, y-9, 4+reach, 8);
      ctx.fillStyle = skinColor; ctx.fillRect(x+9+reach, y-7, 6, 6);
    } else if (p.dir === 1) {
      ctx.fillStyle = color; ctx.fillRect(x+7, y-9, 4, 15);
      ctx.fillStyle = skinColor; ctx.fillRect(x+7, y+4, 4, 4);
      ctx.fillStyle = color; ctx.fillRect(x-11-reach, y-9, 4+reach, 8);
      ctx.fillStyle = skinColor; ctx.fillRect(x-15-reach, y-7, 6, 6);
    } else if (p.dir === 0) {
      ctx.fillStyle = color; ctx.fillRect(x-11, y-9, 4, 15);
      ctx.fillStyle = skinColor; ctx.fillRect(x-11, y+4, 4, 4);
      ctx.fillStyle = color; ctx.fillRect(x+7, y-9, 4, 8+reach);
      ctx.fillStyle = skinColor; ctx.fillRect(x+6, y-1+reach, 6, 6);
    } else {
      ctx.fillStyle = color; ctx.fillRect(x+7, y-9, 4, 15);
      ctx.fillStyle = skinColor; ctx.fillRect(x+7, y+4, 4, 4);
      ctx.fillStyle = color; ctx.fillRect(x-11, y-9-reach, 4, 8+reach);
      ctx.fillStyle = skinColor; ctx.fillRect(x-13, y-13-reach, 6, 6);
    }
  } else if (walking) {
    const as = Math.sin(frame*Math.PI/2)*4;
    ctx.fillStyle = color;
    ctx.fillRect(x-11, y-9+as, 4, 15); ctx.fillRect(x+7, y-9-as, 4, 15);
    ctx.fillStyle = skinColor;
    ctx.fillRect(x-11, y+4+as, 4, 4); ctx.fillRect(x+7, y+4-as, 4, 4);
  } else {
    ctx.fillStyle = color;
    ctx.fillRect(x-11, y-9, 4, 15); ctx.fillRect(x+7, y-9, 4, 15);
    ctx.fillStyle = skinColor;
    ctx.fillRect(x-11, y+4, 4, 4); ctx.fillRect(x+7, y+4, 4, 4);
  }

  // head
  const avatarImg = isMe ? myAvatarImg : (p._pid && remoteAvatarImgs[p._pid]);
  if (avatarImg && avatarImg.complete && avatarImg.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y-17, 11, 0, Math.PI*2); ctx.closePath(); ctx.clip();
    ctx.drawImage(avatarImg, x-11, y-28, 22, 22);
    ctx.restore();
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y-17, 11, 0, Math.PI*2); ctx.stroke();
  } else {
    // detailed pixel head
    ctx.fillStyle = skinColor;
    ctx.fillRect(x-7, y-24, 14, 13);
    // hair
    ctx.fillStyle = '#4a3728';
    ctx.fillRect(x-8, y-26, 16, 5);
    ctx.fillRect(x-8, y-26, 3, 8);
    ctx.fillRect(x+5, y-26, 3, 8);
    // eyes
    ctx.fillStyle = '#fff';
    if (p.dir === 0 || p.dir === 3) {
      ctx.fillRect(x-5, y-19, 4, 4); ctx.fillRect(x+1, y-19, 4, 4);
      ctx.fillStyle = '#333';
      ctx.fillRect(x-4, y-18, 2, 3); ctx.fillRect(x+2, y-18, 2, 3);
      // mouth
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(x-2, y-14, 4, 2);
    } else if (p.dir === 1) {
      ctx.fillRect(x-6, y-19, 4, 4);
      ctx.fillStyle = '#333';
      ctx.fillRect(x-6, y-18, 2, 3);
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(x-4, y-14, 3, 2);
    } else {
      ctx.fillRect(x+2, y-19, 4, 4);
      ctx.fillStyle = '#333';
      ctx.fillRect(x+4, y-18, 2, 3);
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(x+1, y-14, 3, 2);
    }
    // ear
    ctx.fillStyle = '#e8b98a';
    if (p.dir !== 1) ctx.fillRect(x+6, y-20, 3, 4);
    if (p.dir !== 2) ctx.fillRect(x-9, y-20, 3, 4);
  }

  drawEquipment(x, y, p.dir, p.equips || (isMe ? myPlayer.equips : []), frame);
  ctx.restore();

  // HP bar
  drawHpBar(x, y-40, p.hp??MAX_HP);

  // name tag with rounded bg
  ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  const tw = ctx.measureText(name).width;
  const nbx2=x-tw/2-5, nby2=y-55, nbw2=tw+10, nbh2=15, nr2=4;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.moveTo(nbx2+nr2,nby2); ctx.lineTo(nbx2+nbw2-nr2,nby2);
  ctx.quadraticCurveTo(nbx2+nbw2,nby2,nbx2+nbw2,nby2+nr2); ctx.lineTo(nbx2+nbw2,nby2+nbh2-nr2);
  ctx.quadraticCurveTo(nbx2+nbw2,nby2+nbh2,nbx2+nbw2-nr2,nby2+nbh2); ctx.lineTo(nbx2+nr2,nby2+nbh2);
  ctx.quadraticCurveTo(nbx2,nby2+nbh2,nbx2,nby2+nbh2-nr2); ctx.lineTo(nbx2,nby2+nr2);
  ctx.quadraticCurveTo(nbx2,nby2,nbx2+nr2,nby2); ctx.fill();
  ctx.fillStyle = isMe ? '#f0ad4e' : '#fff';
  ctx.fillText(name, x, y-43);

  if ((isMe && micEnabled) || (!isMe && p.voiceOn)) {
    ctx.font = '10px sans-serif'; ctx.fillText('🔊', x+tw/2+10, y-43);
  }

  // emote
  if (p.emote && now - p.emoteTime < EMOTE_DURATION) {
    const et = (now - p.emoteTime) / EMOTE_DURATION;
    const alpha = et < 0.1 ? et/0.1 : et > 0.7 ? (1-et)/0.3 : 1;
    const floatY = y - 74 - et * 20;
    const scale = et < 0.15 ? 0.5 + et/0.15*0.5 : 1;
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.font = `${Math.round(28*scale)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.emote, x, floatY);
    ctx.restore();
  }

  // chat bubble
  if (p.chatImage && now-p.chatImageTime < IMG_CHAT_DURATION) {
    drawImageBubble(x, y-62, p.chatImage, Math.min(1, (1-(now-p.chatImageTime)/IMG_CHAT_DURATION)*3));
  } else if (p.chat && now-p.chatTime < CHAT_DURATION) {
    drawChatBubble(x, y-62, p.chat, Math.min(1, (1-(now-p.chatTime)/CHAT_DURATION)*3));
  }
}

function drawChatBubble(x, y, text, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.font = '13px sans-serif';
  const tw = ctx.measureText(text).width;
  const pw = tw+18, ph = 24, bx = x-pw/2, by = y-ph-8;
  ctx.fillStyle = '#fff'; ctx.beginPath();
  const r = 8;
  ctx.moveTo(bx+r,by); ctx.lineTo(bx+pw-r,by);
  ctx.quadraticCurveTo(bx+pw,by,bx+pw,by+r); ctx.lineTo(bx+pw,by+ph-r);
  ctx.quadraticCurveTo(bx+pw,by+ph,bx+pw-r,by+ph); ctx.lineTo(bx+r,by+ph);
  ctx.quadraticCurveTo(bx,by+ph,bx,by+ph-r); ctx.lineTo(bx,by+r);
  ctx.quadraticCurveTo(bx,by,bx+r,by); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x-5,by+ph); ctx.lineTo(x,by+ph+7); ctx.lineTo(x+5,by+ph); ctx.fill();
  ctx.fillStyle = '#222'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, by+ph/2);
  ctx.restore();
}

const IMG_CHAT_DURATION = 8000;
function drawImageBubble(x, y, dataUrl, alpha) {
  const img = loadChatImage(dataUrl);
  if (!img.complete || !img.naturalWidth) return;
  let w = img.naturalWidth, h = img.naturalHeight;
  const maxW = 120, maxH = 80;
  if (w > maxW) { h = h * maxW / w; w = maxW; }
  if (h > maxH) { w = w * maxH / h; h = maxH; }
  w = Math.round(w); h = Math.round(h);
  const pad = 6, r = 8;
  const pw = w + pad*2, ph = h + pad*2;
  const bx = x - pw/2, by = y - ph - 10;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(bx+r, by); ctx.lineTo(bx+pw-r, by);
  ctx.quadraticCurveTo(bx+pw, by, bx+pw, by+r); ctx.lineTo(bx+pw, by+ph-r);
  ctx.quadraticCurveTo(bx+pw, by+ph, bx+pw-r, by+ph); ctx.lineTo(bx+r, by+ph);
  ctx.quadraticCurveTo(bx, by+ph, bx, by+ph-r); ctx.lineTo(bx, by+r);
  ctx.quadraticCurveTo(bx, by, bx+r, by);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-5, by+ph); ctx.lineTo(x, by+ph+7); ctx.lineTo(x+5, by+ph);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.drawImage(img, bx+pad, by+pad, w, h);
  ctx.restore();
}

function drawAttackEffects() {
  const now = Date.now();
  for (const ef of attackEffects) {
    const t = (now-ef.time)/350; if (t>1) continue;
    ctx.save();

    let ox=0, oy=0;
    if (ef.dir===0) { ox=ef.x; oy=ef.y+24; }
    else if (ef.dir===1) { ox=ef.x-24; oy=ef.y; }
    else if (ef.dir===2) { ox=ef.x+24; oy=ef.y; }
    else { ox=ef.x; oy=ef.y-24; }

    ctx.translate(ox, oy);
    ctx.globalAlpha = (1-t)*0.9;

    // impact burst lines
    const scale = 0.3 + t * 0.7;
    ctx.scale(scale, scale);
    const spokes = 6;
    for (let i = 0; i < spokes; i++) {
      const angle = (i / spokes) * Math.PI * 2 + t * 2;
      const innerR = 4, outerR = 12 + t * 8;
      ctx.strokeStyle = i % 2 === 0 ? '#ffe082' : '#fff';
      ctx.lineWidth = 3 - t * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle)*innerR, Math.sin(angle)*innerR);
      ctx.lineTo(Math.cos(angle)*outerR, Math.sin(angle)*outerR);
      ctx.stroke();
    }

    // center flash
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = (1-t) * 0.6;
    ctx.beginPath(); ctx.arc(0, 0, 6*(1-t), 0, Math.PI*2); ctx.fill();

    ctx.restore();
  }
}

function draw() {
  if (!gameStarted) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,canvas.width,canvas.height);

  const viewW = canvas.width / OBJ_SCALE, viewH = canvas.height / OBJ_SCALE;
  camX = myPlayer.x - viewW/2; camY = myPlayer.y - viewH/2;
  camX = Math.max(0, Math.min(MAP_W - viewW, camX));
  camY = Math.max(0, Math.min(MAP_H - viewH, camY));

  ctx.save();
  ctx.scale(OBJ_SCALE, OBJ_SCALE);
  ctx.translate(-Math.round(camX), -Math.round(camY));

  const sc=Math.max(0,Math.floor(camX/TILE)), ec=Math.min(MAP_COLS,Math.ceil((camX+viewW)/TILE)+1);
  const sr=Math.max(0,Math.floor(camY/TILE)), er=Math.min(MAP_ROWS,Math.ceil((camY+viewH)/TILE)+1);
  for (let r=sr;r<er;r++) for (let c=sc;c<ec;c++) drawTile(c,r);

  // collect cars and players, sort by y for depth
  const all = [{...myPlayer, name:nameInput.value||'Player', _isMe:true}];
  for (const [pid, rp] of Object.entries(remotePlayers)) all.push({...rp, _isMe:false, _pid:pid});

  const drawables = [];
  for (const car of cars) drawables.push({ type:'car', y: car.y, car });
  for (const chest of chests) drawables.push({ type:'chest', y: chest.y, chest });
  for (const p of all) drawables.push({ type:'player', y: p.y, p });
  drawables.push({ type:'switch', y: resetSwitch.y });
  drawables.push({ type:'boss', y: boss.y });
  drawables.sort((a,b) => a.y - b.y);

  for (const d of drawables) {
    if (d.type === 'car') drawCar(d.car);
    else if (d.type === 'chest') drawChest(d.chest);
    else if (d.type === 'switch') drawResetSwitch();
    else if (d.type === 'boss') drawBoss();
    else drawCharacter(d.p, d.p._isMe);
  }
  drawAttackEffects();
  drawChestEffects();
  drawRoomLabels();
  drawWhiteboardContent();
  ctx.restore();

  if (Date.now() < damageFlashUntil) {
    ctx.fillStyle = 'rgba(233,69,96,0.25)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  drawMinimap();
}

function drawMinimap() {
  const mw=160, mh=mw*(MAP_ROWS/MAP_COLS);
  const mx=canvas.width-mw-12, my=12;
  const sx=mw/MAP_W, sy=mh/MAP_H;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(mx-2,my-2,mw+4,mh+4);
  const mmColors = {
    [T.FLOOR]:'#e2dace', [T.WALL]:'#7f8c8d', [T.DESK]:'#b08050', [T.MONITOR]:'#2c3e50',
    [T.CARPET]:'#5b7fa5', [T.CORRIDOR]:'#d4cec2', [T.DOOR]:'#a0724a', [T.WINDOW]:'#85c1e9',
    [T.PLANT]:'#27ae60', [T.PANTRY_FLOOR]:'#f0e6d3', [T.COUNTER]:'#95a5a6', [T.FRIDGE]:'#ecf0f1',
    [T.COFFEE]:'#2c3e50', [T.CHAIR]:'#4a4a5e', [T.WHITEBOARD]:'#ecf0f1', [T.SOFA]:'#8e44ad', [T.TABLE]:'#b08050',
  };
  for (let r=0;r<MAP_ROWS;r++) for (let c=0;c<MAP_COLS;c++) {
    ctx.fillStyle = mmColors[MAP[r][c]] || '#d4cec2';
    ctx.fillRect(mx+c*(mw/MAP_COLS), my+r*(mh/MAP_ROWS), mw/MAP_COLS+.5, mh/MAP_ROWS+.5);
  }
  // chest dots
  for (const chest of chests) {
    if (chest.opened) continue;
    ctx.fillStyle = '#f1c40f';
    ctx.fillRect(mx + chest.x * sx - 1.5, my + chest.y * sy - 1.5, 3, 3);
  }
  // car dots
  for (const car of cars) {
    ctx.fillStyle = car.color || '#888';
    ctx.fillRect(mx+car.x*sx-2, my+car.y*sy-1.5, 4, 3);
  }
  ctx.fillStyle = '#f0ad4e';
  ctx.beginPath(); ctx.arc(mx+myPlayer.x*sx,my+myPlayer.y*sy,3,0,Math.PI*2); ctx.fill();
  for (const rp of Object.values(remotePlayers)) {
    ctx.fillStyle = rp.color||'#5bc0de';
    ctx.beginPath(); ctx.arc(mx+rp.x*sx,my+rp.y*sy,2.5,0,Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
  const vw=canvas.width/OBJ_SCALE, vh=canvas.height/OBJ_SCALE;
  ctx.strokeRect(mx+camX*sx,my+camY*sy,vw*sx,vh*sy);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
updateOnlineCount();
loop();
</script>
